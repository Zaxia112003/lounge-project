<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lounge — Realm</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--bg2:#0c0e1c;--bg3:#111327;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.2);
  --text:#e8eaf6;--muted:rgba(232,234,246,0.5);--muted2:rgba(232,234,246,0.25);
  --gold:#c9a84c;--gold2:#f0cc6e;--gold3:rgba(201,168,76,0.15);
  --purple:#8b2dff;--pink:#f72b6e;--blue:#2d7fff;--teal:#00d4b4;
  --green:#1dd17a;--red:#ff3d3d;--amber:#ffb830;
  --grad:linear-gradient(135deg,#f72b6e,#8b2dff,#2d7fff);
  --grad-gold:linear-gradient(135deg,#c9a84c,#f0cc6e,#c9a84c);
  --font-d:'Cinzel',serif;--font-b:'Exo 2',sans-serif;
}
body{min-height:100vh;font-family:var(--font-b);background:var(--bg);color:var(--text);overflow-x:hidden;font-size:14px;}

.bg-fixed{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:drift 18s ease-in-out infinite alternate;}
.o1{width:700px;height:700px;background:radial-gradient(circle,rgba(139,45,255,.12),transparent 70%);top:-250px;left:-200px;}
.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,.08),transparent 70%);top:20%;right:-150px;animation-delay:-6s;}
.o3{width:600px;height:600px;background:radial-gradient(circle,rgba(247,43,110,.08),transparent 70%);bottom:-200px;left:30%;animation-delay:-12s;}
.scanlines{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);}
@keyframes drift{0%{transform:translate(0,0);}100%{transform:translate(25px,20px);}}

/* LOGIN */
#pg-login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);}
#pg-login.hidden{display:none;}
.login-wrap{text-align:center;animation:fadeUp .6s cubic-bezier(.22,1,.36,1) both;}
.login-crest{width:80px;height:80px;margin:0 auto 24px;background:var(--grad-gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 40px rgba(201,168,76,.3),0 0 80px rgba(201,168,76,.1);}
.login-title{font-family:var(--font-d);font-size:28px;font-weight:700;letter-spacing:2px;color:var(--gold2);margin-bottom:4px;}
.login-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:36px;}
.login-field{width:260px;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--text);font-family:var(--font-b);outline:none;text-align:center;letter-spacing:1px;transition:all .2s;margin-bottom:12px;}
.login-field:focus{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.06);box-shadow:0 0 0 3px rgba(201,168,76,.1);}
.login-field::placeholder{color:var(--muted2);}
.login-btn{width:260px;background:var(--grad-gold);border:none;border-radius:10px;padding:13px;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#07080f;font-family:var(--font-d);cursor:pointer;transition:opacity .2s,transform .15s;}
.login-btn:hover{opacity:.88;}.login-btn:active{transform:scale(.98);}
.login-err{font-size:12px;color:#ff6b9d;margin-top:8px;min-height:16px;}
.back-link{margin-top:20px;font-size:11px;color:var(--muted);letter-spacing:1px;cursor:pointer;transition:color .2s;display:inline-block;}
.back-link:hover{color:var(--gold);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}

/* MAIN */
#pg-main{display:none;position:relative;z-index:1;min-height:100vh;padding:28px 24px 40px;}
#pg-main.active{display:block;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.realm-badge{font-family:var(--font-d);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:4px 10px;background:rgba(201,168,76,.06);}
.topbar-title{font-family:var(--font-d);font-size:18px;font-weight:700;letter-spacing:1px;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.back-btn{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border:1px solid var(--border2);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.back-btn:hover{color:var(--text);border-color:var(--border3);}
.signout-btn{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:color .2s;}
.signout-btn:hover{color:var(--red);}

/* LAYOUT */
.realm-grid{display:grid;grid-template-columns:300px 1fr;gap:20px;max-width:1100px;margin:0 auto;}

/* CHARACTER CARD */
.char-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:28px 24px;position:relative;overflow:hidden;}
.char-card::before{content:'';position:absolute;inset:-1px;border-radius:16px;background:var(--grad-gold);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;padding:1px;pointer-events:none;opacity:.4;}
.char-sprite-wrap{display:flex;justify-content:center;margin-bottom:20px;position:relative;}
.char-sprite{width:110px;height:110px;position:relative;}
.char-aura{position:absolute;inset:-12px;border-radius:50%;animation:pulse-aura 3s ease-in-out infinite;}
@keyframes pulse-aura{0%,100%{opacity:.3;transform:scale(1);}50%{opacity:.6;transform:scale(1.05);}}
.char-level-badge{position:absolute;bottom:-6px;right:-6px;background:var(--grad-gold);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:12px;font-weight:700;color:#07080f;border:2px solid var(--bg2);}
.char-name{font-family:var(--font-d);font-size:20px;font-weight:700;letter-spacing:.5px;text-align:center;color:var(--text);margin-bottom:2px;}
.char-class{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;text-align:center;margin-bottom:6px;}
.char-class.archivist{color:var(--purple);}
.char-class.sentinel{color:var(--teal);}
.char-class.gamemaster{color:var(--gold);}
.char-title-txt{font-size:12px;color:var(--muted);text-align:center;margin-bottom:20px;}
.xp-row{display:flex;justify-content:space-between;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.xp-bar-bg{width:100%;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:20px;}
.xp-bar-fill{height:100%;border-radius:3px;background:var(--grad-gold);transition:width .8s cubic-bezier(.22,1,.36,1);}
.card-divider{height:1px;background:var(--border);margin:20px 0;}
.credits-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.credits-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.credits-val{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--gold2);}
.credits-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.status-row{display:flex;gap:8px;flex-wrap:wrap;}
.status-chip{font-size:10px;letter-spacing:.8px;text-transform:uppercase;padding:3px 9px;border-radius:4px;font-weight:600;}
.chip-green{background:rgba(29,209,122,.12);color:var(--green);border:1px solid rgba(29,209,122,.25);}
.chip-amber{background:rgba(255,184,48,.1);color:var(--amber);border:1px solid rgba(255,184,48,.2);}
.chip-purple{background:rgba(139,45,255,.12);color:#c084fc;border:1px solid rgba(139,45,255,.25);}
.chip-red{background:rgba(255,61,61,.1);color:var(--red);border:1px solid rgba(255,61,61,.2);}
.chip-teal{background:rgba(0,212,180,.1);color:var(--teal);border:1px solid rgba(0,212,180,.2);}

/* RIGHT */
.right-col{display:flex;flex-direction:column;gap:16px;}
.panel{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;}
.panel-title{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.3),transparent);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.stat-block{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;}
.stat-block::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px;}
.stat-block.str::before{background:#f72b6e;}
.stat-block.int::before{background:#8b2dff;}
.stat-block.def::before{background:#2d7fff;}
.stat-block.agi::before{background:#00d4b4;}
.stat-block.lck::before{background:#ffb830;}
.stat-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.stat-val{font-family:var(--font-d);font-size:28px;font-weight:700;line-height:1;margin-bottom:8px;}
.stat-block.str .stat-val{color:#f72b6e;}
.stat-block.int .stat-val{color:#c084fc;}
.stat-block.def .stat-val{color:#60a5fa;}
.stat-block.agi .stat-val{color:var(--teal);}
.stat-block.lck .stat-val{color:var(--amber);}
.stat-bar-bg{width:100%;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.22,1,.36,1);}
.stat-block.str .stat-bar-fill{background:#f72b6e;}
.stat-block.int .stat-bar-fill{background:#8b2dff;}
.stat-block.def .stat-bar-fill{background:#2d7fff;}
.stat-block.agi .stat-bar-fill{background:#00d4b4;}
.stat-block.lck .stat-bar-fill{background:#ffb830;}
.stat-desc{font-size:10px;color:var(--muted2);margin-top:6px;line-height:1.5;}
.equip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.equip-slot{aspect-ratio:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all .18s;position:relative;}
.equip-slot:hover{border-color:var(--border2);}
.equip-slot.filled{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.05);}
.equip-icon{font-size:20px;}
.equip-label{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);}
.equip-slot.filled .equip-label{color:var(--gold);}
.equip-rarity{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;}
.rarity-common{background:#888;}.rarity-rare{background:#2d7fff;}.rarity-epic{background:#8b2dff;}.rarity-legendary{background:var(--gold);}
.activity-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.activity-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.activity-val{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--text);margin-bottom:2px;}
.activity-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.activity-delta{font-size:10px;margin-top:4px;}
.delta-up{color:var(--green);}
.streak-row{display:flex;gap:5px;margin-top:14px;}
.streak-dot{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;}
.streak-dot.active{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.4);color:var(--gold2);}
.streak-dot.today{background:var(--grad-gold);border-color:var(--gold);color:#07080f;font-weight:700;}

/* MANAGER */
.manager-banner{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:28px;text-align:center;}
.manager-crown{font-size:48px;margin-bottom:12px;}
.manager-title{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--gold2);margin-bottom:6px;letter-spacing:1px;}
.manager-desc{font-size:13px;color:var(--muted);line-height:1.7;max-width:400px;margin:0 auto 20px;}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:20px;}
.team-mini{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .18s;}
.team-mini:hover{border-color:rgba(201,168,76,.4);transform:translateY(-2px);background:rgba(201,168,76,.04);}
.team-mini-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:16px;font-weight:700;color:#fff;margin:0 auto 10px;}
.team-mini-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.team-mini-class{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.team-mini-level{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--gold2);margin-top:6px;}

/* CONSOLE BACK BUTTON */
.console-back{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);cursor:pointer;margin-bottom:0;transition:opacity .2s;}
.console-back:hover{opacity:.7;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-overlay.hidden{display:none;}
.loading-icon{font-size:40px;animation:spin 2s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.loading-text{font-family:var(--font-d);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}

@media(max-width:768px){
  .realm-grid{grid-template-columns:1fr !important;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  #pg-main{padding:20px 16px 40px;}
}
</style>
</head>
<body>

<div class="bg-fixed">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
</div>
<div class="scanlines"></div>

<!-- Loading -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-icon">⚔️</div>
  <div class="loading-text">Entering the Realm...</div>
</div>

<!-- Login -->
<div id="pg-login" class="hidden">
  <div class="login-wrap">
    <div class="login-crest">⚔️</div>
    <div class="login-title">The Realm</div>
    <div class="login-sub">Lounge Project · RPG</div>
    <input class="login-field" id="login-nick" type="text" placeholder="Your nickname" autocomplete="off" spellcheck="false">
    <br>
    <button class="login-btn" id="login-btn" onclick="doRpgLogin()">Enter Realm</button>
    <div class="login-err" id="login-err"></div>
    <a href="index.html" class="back-link" style="display:block;margin-top:20px;">← Back to The Lounge</a>
  </div>
</div>

<!-- Main -->
<div id="pg-main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="realm-badge">⚔ The Realm</span>
      <span class="topbar-title" id="tb-title">Character</span>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="back-btn">← The Lounge</a>
      <span class="signout-btn" onclick="rpgSignout()">Sign Out</span>
    </div>
  </div>
  <div class="realm-grid" id="realm-grid"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyByZVGBzLgXw59s1qCM8NOyuUYMDCZi84o",
  authDomain: "rta-portal-ee180.firebaseapp.com",
  projectId: "rta-portal-ee180",
  storageBucket: "rta-portal-ee180.firebasestorage.app",
  messagingSenderId: "873530548996",
  appId: "1:873530548996:web:bcb927ca8a4a8501936651"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let cu = null;
let teamDir = {};
let perfData = {};
let credData = {};
let kcData   = {};
let attData  = {};
let unoData  = {};
let rpgData  = {};
const unsubs = [];

/* ── Helpers ── */
function getSydneyDateStr() {
  try { return new Date().toLocaleDateString("en-CA", { timeZone: "Australia/Sydney" }); } catch(e) { return new Date().toISOString().slice(0, 10); }
}
function getSydneyDate() {
  const str = getSydneyDateStr(); return new Date(str + "T00:00:00Z");
}
function todayKey() { return getSydneyDateStr(); }
function weekKey() {
  const d = getSydneyDate();
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() - day + 1);
  return d.toISOString().slice(0, 10);
}
function initials(name) {
  return (name || '').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}
function classFromRole(role) {
  if (role === 'manager')    return { label: 'Game Master', key: 'gamemaster', emoji: '👑' };
  if (role === 'escalation') return { label: 'Sentinel',    key: 'sentinel',   emoji: '🛡' };
  return                            { label: 'Archivist',   key: 'archivist',  emoji: '📜' };
}
function titleFromLevel(level) {
  if (level >= 20) return 'Legendary Archivist';
  if (level >= 15) return 'Elite Operative';
  if (level >= 10) return 'Seasoned Agent';
  if (level >= 5)  return 'Field Agent';
  return 'Initiate';
}
function auraColor(cls) {
  if (cls === 'gamemaster') return 'rgba(201,168,76,.25)';
  if (cls === 'sentinel')   return 'rgba(0,212,180,.2)';
  return 'rgba(139,45,255,.2)';
}

/* ── Stat calcs ── */
function safeDateKey(baseDate, daysBack) {
  try {
    const d = new Date(baseDate);
    d.setUTCDate(d.getUTCDate() - daysBack);
    return d.toISOString().slice(0, 10);
  } catch(e) { return ''; }
}
function calcSTR(nick) {
  try {
    const days = [];
    const today = getSydneyDate();
    for (let i = 0; i < 7; i++) {
      const key = safeDateKey(today, i);
      days.push(key ? ((perfData[nick]?.[key]?.uploadsTotal) || 0) : 0);
    }
    const avg = days.reduce((a,b) => a+b, 0) / 7;
    return Math.min(Math.round(avg * 2.5), 100);
  } catch(e) { return 0; }
}
function calcINT(nick) {
  const kc = kcData[nick + '_' + weekKey()];
  if (!kc) return 0;
  return Math.min(Math.round((kc.score / 15) * 100), 100);
}
function calcDEF(nick) {
  try {
    let streak = 0;
    const today = getSydneyDate();
    for (let i = 0; i < 14; i++) {
      const key = safeDateKey(today, i);
      if (!key) break;
      const att = attData[nick + '_' + key];
      if (att && (att.status === 'present' || att.status === 'late')) { streak++; }
      else if (i > 0) { break; }
    }
    return Math.min(Math.round((streak / 14) * 100), 100);
  } catch(e) { return 0; }
}
function calcAGI(nick) {
  try {
    let inShift = 0, total = 0;
    const today = getSydneyDate();
    for (let i = 0; i < 7; i++) {
      const key = safeDateKey(today, i);
      if (!key) continue;
      const day = perfData[nick]?.[key];
      if (day) { inShift += day.uploadsInShift || 0; total += day.uploadsTotal || 0; }
    }
    if (!total) return 0;
    return Math.min(Math.round((inShift / total) * 100), 100);
  } catch(e) { return 0; }
}
function calcLCK(nick) {
  const uno = unoData[nick];
  if (!uno) return Math.floor(Math.random() * 15) + 5;
  return Math.min(Math.round(((uno.streak || 0) / 20) * 100), 100);
}
function calcXP(nick) {
  let total = 0;
  Object.values(perfData[nick] || {}).forEach(day => { total += day.uploadsTotal || 0; });
  return total * 10;
}
function calcLevel(xp) {
  let level = 1, needed = 500;
  while (xp >= needed) { xp -= needed; level++; needed += 200; if (level >= 30) break; }
  return { level, current: xp, needed };
}
function calcCredits(nick) {
  return credData[nick] || { credits: 0 };
}
function calcStreak7(nick) {
  try {
    const result = [];
    const today = getSydneyDate();
    for (let i = 6; i >= 0; i--) {
      const key = safeDateKey(today, i);
      const d2 = key ? new Date(key + 'T00:00:00Z') : new Date();
      const dayStr = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d2.getUTCDay()];
      const att = key ? attData[nick + '_' + key] : null;
      result.push({ day: dayStr, present: !!(att && (att.status === 'present' || att.status === 'late')), isToday: i === 0 });
    }
    return result;
  } catch(e) { return []; }
}
function todayUploads(nick) { return perfData[nick]?.[todayKey()]?.uploadsTotal || 0; }
function weekUploads(nick) {
  try {
    let total = 0;
    const today = getSydneyDate();
    for (let i = 0; i < 7; i++) {
      const key = safeDateKey(today, i);
      if (key) total += perfData[nick]?.[key]?.uploadsTotal || 0;
    }
    return total;
  } catch(e) { return 0; }
}

/* ── RPG profile ── */
async function ensureRpgProfile(nick) {
  const ref = doc(db, 'rpg_profile', nick);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, { nick, equippedItems: {}, createdAt: new Date().toISOString() });
    return { nick, equippedItems: {} };
  }
  return snap.data();
}

/* ── Render character ── */
function renderCharacter(nick) {
  const member = teamDir[nick] || {};
  const role   = member.role || (nick === cu.nickname ? cu.role : 'uploader');
  const cls    = classFromRole(role);
  const str    = calcSTR(nick);
  const int_   = calcINT(nick);
  const def    = calcDEF(nick);
  const agi    = calcAGI(nick);
  const lck    = calcLCK(nick);
  const xp     = calcXP(nick);
  const { level, current: xpCurrent, needed: xpNeeded } = calcLevel(xp);
  const xpPct  = Math.min(Math.round((xpCurrent / xpNeeded) * 100), 100);
  const cred   = calcCredits(nick);
  const streak7= calcStreak7(nick);
  const todayUpl = todayUploads(nick);
  const weekUpl  = weekUploads(nick);
  const equipped = rpgData[nick]?.equippedItems || {};

  /* Update topbar */

    document.getElementById('tb-title').innerHTML =
      `<span class="console-back" onclick="goConsole()">← Console</span>
       <span style="color:var(--muted);margin:0 8px;">·</span>
       <span style="font-size:15px;">${member.fullName || nick}</span>`;
  } else {
    document.getElementById('tb-title').textContent = 'Character';
  }

  const streakDots = streak7.map(d =>
    `<div class="streak-dot ${d.isToday ? 'today' : d.present ? 'active' : ''}" title="${d.day}">
      ${d.present ? '✓' : d.isToday ? '?' : '·'}
    </div>`
  ).join('');

  const equipSlots = [
    { key: 'armor',  label: 'Armor',  emoji: '🛡' },
    { key: 'weapon', label: 'Weapon', emoji: '⚔️' },
    { key: 'ring',   label: 'Ring',   emoji: '💍' },
    { key: 'cape',   label: 'Cape',   emoji: '🧣' },
  ].map(slot => {
    const item   = equipped[slot.key];
    const filled = !!item;
    const rarity = item?.rarity || '';
    return `<div class="equip-slot ${filled ? 'filled' : ''}" title="${filled ? item.name : 'Empty slot'}">
      ${rarity ? `<div class="equip-rarity rarity-${rarity}"></div>` : ''}

      <div class="equip-label">${filled ? item.name.slice(0,7) : slot.label}</div>

      <div class="char-sprite-wrap">
        <div class="char-sprite">
          <div class="char-aura" style="background:radial-gradient(circle,${auraColor(cls.key)},transparent 70%);"></div>
          ${buildSpriteSVG(cls.key)}
          <div class="char-level-badge">${level}</div>
        </div>
      </div>
      <div class="char-name">${member.fullName || cu.fullName}</div>
      <div class="char-class ${cls.key}">${cls.emoji} ${cls.label}</div>
      <div class="char-title-txt">${titleFromLevel(level)}</div>
      <div class="xp-row"><span>XP</span><span>${xpCurrent.toLocaleString()} / ${xpNeeded.toLocaleString()}</span></div>
      <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
      <div class="credits-row">
        <div>
          <div class="credits-label">Game Credits</div>
          <div class="credits-sub">Today's balance</div>
        </div>
        <div style="text-align:right">
          <div class="credits-val">⬡ ${cred.credits || 0}</div>
        </div>
      </div>
      <div class="card-divider"></div>
      <div class="panel-title" style="font-size:10px;margin-bottom:12px;">Equipment</div>
      <div class="equip-grid">${equipSlots}</div>
      <div class="card-divider"></div>
      <div class="status-row">
        <span class="status-chip chip-${str > 60 ? 'green' : str > 30 ? 'amber' : 'red'}">STR ${str}</span>
        <span class="status-chip chip-${int_ > 60 ? 'purple' : 'amber'}">INT ${int_}</span>
        <span class="status-chip chip-${def > 60 ? 'teal' : 'amber'}">DEF ${def}</span>
      </div>
    </div>

    <div class="right-col">
      <div class="panel">
        <div class="panel-title">Core Stats</div>
        <div class="stats-grid">
          <div class="stat-block str">
            <div class="stat-label">Strength</div>
            <div class="stat-val">${str}</div>
            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${str}%"></div></div>
            <div class="stat-desc">Upload volume — 7-day avg</div>

          <div class="stat-block int">

            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${int_}%"></div></div>
            <div class="stat-desc">KB quiz score this week</div>

/* ── Manager console ── */
function renderManagerView() {
  document.getElementById('tb-title').textContent = 'Game Master';
  const members = Object.entries(teamDir)
    .filter(([, m]) => m.role !== 'manager')
    .sort((a, b) => calcXP(b[0]) - calcXP(a[0]))  // sort by XP descending
    .map(([nick, m]) => {
      const xp  = calcXP(nick);
      const { level } = calcLevel(xp);
      const cls = classFromRole(m.role);
      const avatarBg = m.role === 'escalation'
        ? 'linear-gradient(135deg,#0f6e56,#00d4b4)'
        : 'linear-gradient(135deg,#8b2dff,#2d7fff)';
      return `<div class="team-mini" onclick="window._rpgViewMember('${nick}')">
        <div class="team-mini-avatar" style="background:${avatarBg}">${initials(m.fullName)}</div>
        <div class="team-mini-name">${m.fullName}</div>
        <div class="team-mini-class">${cls.emoji} ${cls.label}</div>
        <div class="team-mini-level">Lv ${level}</div>
      </div>`;
    }).join('');

  const grid = document.getElementById('realm-grid');
  grid.style.gridTemplateColumns = '1fr';
  grid.innerHTML = `
    <div>
      <div class="manager-banner">
        <div class="manager-crown">👑</div>
        <div class="manager-title">Game Master Console</div>
        <div class="manager-desc">You oversee The Realm. Your agents earn XP through uploads, knowledge battles, and attendance. Select a member to view their character sheet.</div>
      </div>
      <div class="team-grid">${members}</div>
    </div>
  `;
}

/* ── Global actions ── */
window._rpgViewMember = async function(nick) {
  // Ensure rpg profile loaded for viewed member
  if (!rpgData[nick]) {
    const prof = await ensureRpgProfile(nick);
    rpgData[nick] = prof;
  }
  renderCharacter(nick);
};

window.goConsole = function() {
  renderManagerView();
};

/* ── Firestore subscriptions ── */
function subscribe(nick) {
  unsubs.push(onSnapshot(collection(db, 'perfData'), snap => {
    snap.forEach(d => {
      if (!perfData[d.id]) perfData[d.id] = {};
      Object.assign(perfData[d.id], d.data());
    });
    if (cu.role === 'manager') renderManagerView();
    else renderCharacter(nick);
  }));

  unsubs.push(onSnapshot(doc(db, 'player_credits', nick), snap => {
    if (snap.exists()) credData[nick] = snap.data();
    if (cu.role !== 'manager') renderCharacter(nick);
  }));

  unsubs.push(onSnapshot(collection(db, 'kc_results'), snap => {
    snap.forEach(d => { kcData[d.id] = d.data(); });
    if (cu.role !== 'manager') renderCharacter(nick);
  }));

  unsubs.push(onSnapshot(collection(db, 'attendance'), snap => {
    snap.forEach(d => { attData[d.id] = d.data(); });
    if (cu.role !== 'manager') renderCharacter(nick);
  }));

  unsubs.push(onSnapshot(collection(db, 'uno_streaks'), snap => {
    snap.forEach(d => { unoData[d.id] = d.data(); });
    if (cu.role !== 'manager') renderCharacter(nick);
  }));

  unsubs.push(onSnapshot(collection(db, 'team'), snap => {
    snap.forEach(d => {
      const data = d.data();
      if (data.nickname) teamDir[data.nickname] = data;
    });
    if (cu.role === 'manager') renderManagerView();
  }));
}

/* ── Login ── */
async function loadTeamAndLogin(nick) {
  const snap = await getDocs(collection(db, 'team'));
  snap.forEach(d => {
    const data = d.data();
    if (data.nickname) teamDir[data.nickname] = data;
  });
  return teamDir[nick];
}

window.doRpgLogin = async function() {
  const nickEl = document.getElementById('login-nick');
  const errEl  = document.getElementById('login-err');
  const btn    = document.getElementById('login-btn');
  const nick   = nickEl.value.trim();
  if (!nick) { errEl.textContent = 'Enter your nickname.'; return; }
  btn.disabled = true; btn.textContent = 'Loading...';
  errEl.textContent = '';
  try {
    const member = await loadTeamAndLogin(nick);
    if (!member) {
      errEl.textContent = 'Nickname not found in The Lounge.';
      btn.disabled = false; btn.textContent = 'Enter Realm'; return;
    }
    cu = { nickname: nick, fullName: member.fullName, role: member.role };
    localStorage.setItem('rpg_session', JSON.stringify(cu));
    enterRealm();
  } catch(e) {
    errEl.textContent = 'Connection failed. Try again.';
    btn.disabled = false; btn.textContent = 'Enter Realm';
  }
};

window.rpgSignout = function() {
  unsubs.forEach(u => { try { u(); } catch(e) {} });
  localStorage.removeItem('rpg_session');
  document.getElementById('pg-main').classList.remove('active');
  document.getElementById('pg-login').classList.remove('hidden');
};

async function enterRealm() {
  document.getElementById('pg-login').classList.add('hidden');
  document.getElementById('loading-overlay').classList.remove('hidden');
  const prof = await ensureRpgProfile(cu.nickname);
  rpgData[cu.nickname] = prof;
  document.getElementById('loading-overlay').classList.add('hidden');
  document.getElementById('pg-main').classList.add('active');
  subscribe(cu.nickname);
  if (cu.role === 'manager') renderManagerView();
  else renderCharacter(cu.nickname);
}

/* ── Boot — try auto-login from main app session ── */
(async function boot() {
  // 1. Try rpg_session (set by this app or by main app's goDash)
  const stored = localStorage.getItem('rpg_session');
  if (stored) {
    try {
      cu = JSON.parse(stored);
      if (cu?.nickname && cu?.role) {
        await enterRealm();
        return;
      }
    } catch(e) { localStorage.removeItem('rpg_session'); }
  }

  // 2. Try reading cu from main app's team cache + last logged-in nick
  // Main app stores rta_TEAM — if we also find rta_last_nick we can auto-login
  const lastNick = localStorage.getItem('rta_last_nick');
  const teamCache = localStorage.getItem('rta_TEAM');
  if (lastNick && teamCache) {
    try {
      const team = JSON.parse(teamCache);
      const member = team.find(m => m.nickname === lastNick);
      if (member) {
        cu = { nickname: member.nickname, fullName: member.fullName, role: member.role };
        localStorage.setItem('rpg_session', JSON.stringify(cu));
        await enterRealm();
        return;
      }
    } catch(e) {}
  }

  // 3. Show manual login
  document.getElementById('loading-overlay').classList.add('hidden');
  document.getElementById('pg-login').classList.remove('hidden');
})();

document.getElementById('login-nick').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doRpgLogin();
});
