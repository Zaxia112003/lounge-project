<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lounge — Realm</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--bg2:#0c0e1c;--bg3:#111327;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--border3:rgba(255,255,255,0.2);
  --text:#e8eaf6;--muted:rgba(232,234,246,0.5);--muted2:rgba(232,234,246,0.25);
  --gold:#c9a84c;--gold2:#f0cc6e;
  --purple:#8b2dff;--pink:#f72b6e;--blue:#2d7fff;--teal:#00d4b4;
  --green:#1dd17a;--red:#ff3d3d;--amber:#ffb830;
  --grad-gold:linear-gradient(135deg,#c9a84c,#f0cc6e,#c9a84c);
  --font-d:'Cinzel',serif;--font-b:'Exo 2',sans-serif;
}
body{min-height:100vh;font-family:var(--font-b);background:var(--bg);color:var(--text);overflow-x:hidden;font-size:14px;}

/* BG */
.bg-fixed{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(110px);animation:drift 20s ease-in-out infinite alternate;}
.o1{width:700px;height:700px;background:radial-gradient(circle,rgba(139,45,255,.1),transparent 70%);top:-250px;left:-200px;}
.o2{width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,.07),transparent 70%);top:20%;right:-150px;animation-delay:-7s;}
.o3{width:600px;height:600px;background:radial-gradient(circle,rgba(247,43,110,.07),transparent 70%);bottom:-200px;left:30%;animation-delay:-14s;}
.scanlines{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);}
@keyframes drift{0%{transform:translate(0,0);}100%{transform:translate(30px,20px);}}

/* CHARACTER ANIMATIONS */
@keyframes sway{0%,100%{transform:rotate(-1.2deg) translateX(-1px);}50%{transform:rotate(1.2deg) translateX(1px);}}
@keyframes weapon-bob{0%,100%{transform:translateY(0px) rotate(0deg);}50%{transform:translateY(-3px) rotate(1deg);}}
@keyframes blink{0%,92%,100%{transform:scaleY(1);}95%,97%{transform:scaleY(0.08);}}
@keyframes breathe{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.03);}}
@keyframes aura-pulse{0%,100%{opacity:.25;transform:scale(1);}50%{opacity:.5;transform:scale(1.06);}}
@keyframes gem-pulse{0%,100%{opacity:.7;}50%{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes slideIn{from{opacity:0;transform:translateX(8px);}to{opacity:1;transform:none;}}
.char-svg-wrap{animation:sway 5s ease-in-out infinite;}
.svg-weapon{animation:weapon-bob 3.5s ease-in-out infinite;}
.svg-eyes{animation:blink 5s ease-in-out infinite;}
.svg-body{animation:breathe 4s ease-in-out infinite;transform-origin:center 60px;}
.svg-gem{animation:gem-pulse 2.5s ease-in-out infinite;}
.char-aura{position:absolute;inset:-14px;border-radius:50%;animation:aura-pulse 3s ease-in-out infinite;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-overlay.hidden{display:none;}
.loading-icon{font-size:40px;animation:spin 2s linear infinite;}
.loading-text{font-family:var(--font-d);font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}

/* LOGIN */
#pg-login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg);}
#pg-login.hidden{display:none;}
.login-wrap{text-align:center;animation:fadeUp .6s cubic-bezier(.22,1,.36,1) both;}
.login-crest{width:80px;height:80px;margin:0 auto 24px;background:var(--grad-gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 40px rgba(201,168,76,.3),0 0 80px rgba(201,168,76,.1);}
.login-title{font-family:var(--font-d);font-size:28px;font-weight:700;letter-spacing:2px;color:var(--gold2);margin-bottom:4px;}
.login-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:36px;}
.login-field{width:260px;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:14px;color:var(--text);font-family:var(--font-b);outline:none;text-align:center;letter-spacing:1px;transition:all .2s;margin-bottom:12px;display:block;margin-left:auto;margin-right:auto;}
.login-field:focus{border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.06);box-shadow:0 0 0 3px rgba(201,168,76,.1);}
.login-field::placeholder{color:var(--muted2);}
.login-btn{width:260px;background:var(--grad-gold);border:none;border-radius:10px;padding:13px;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#07080f;font-family:var(--font-d);cursor:pointer;transition:opacity .2s,transform .15s;display:block;margin:0 auto;}
.login-btn:hover{opacity:.88;}.login-btn:active{transform:scale(.98);}
.login-err{font-size:12px;color:#ff6b9d;margin-top:10px;min-height:16px;}
.back-link{margin-top:20px;font-size:11px;color:var(--muted);letter-spacing:1px;cursor:pointer;transition:color .2s;display:inline-block;}
.back-link:hover{color:var(--gold);}

/* MAIN */
#pg-main{display:none;position:relative;z-index:1;min-height:100vh;padding:28px 24px 60px;}
#pg-main.active{display:block;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;max-width:1200px;margin-left:auto;margin-right:auto;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.realm-badge{font-family:var(--font-d);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:4px 10px;background:rgba(201,168,76,.06);}
.topbar-title{font-family:var(--font-d);font-size:18px;font-weight:700;letter-spacing:1px;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.back-btn{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border:1px solid var(--border2);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.back-btn:hover{color:var(--text);border-color:var(--border3);}
.signout-btn{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:color .2s;}
.signout-btn:hover{color:var(--red);}
.console-back{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);cursor:pointer;transition:opacity .2s;}
.console-back:hover{opacity:.7;}

/* LAYOUT */
.realm-grid{display:grid;grid-template-columns:280px 1fr;gap:18px;max-width:1200px;margin:0 auto;}

/* CHARACTER CARD */
.char-card{background:var(--bg2);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:24px 20px;position:relative;overflow:hidden;align-self:start;}
.char-card::before{content:'';position:absolute;inset:0;border-radius:16px;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.06),transparent 60%);pointer-events:none;}
.char-sprite-wrap{display:flex;justify-content:center;margin-bottom:16px;position:relative;height:116px;}
.char-sprite{width:110px;height:110px;position:relative;margin:0 auto;}
.char-level-badge{position:absolute;bottom:-4px;right:-4px;background:var(--grad-gold);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:11px;font-weight:700;color:#07080f;border:2px solid var(--bg2);z-index:2;}
.char-name{font-family:var(--font-d);font-size:18px;font-weight:700;text-align:center;color:var(--text);margin-bottom:2px;letter-spacing:.5px;}
.char-class{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;text-align:center;margin-bottom:4px;}
.char-class.archivist{color:var(--purple);}
.char-class.sentinel{color:var(--teal);}
.char-class.gamemaster{color:var(--gold);}
.char-title-txt{font-size:11px;color:var(--muted);text-align:center;margin-bottom:16px;}
.xp-row{display:flex;justify-content:space-between;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.xp-bar-bg{width:100%;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:16px;}
.xp-bar-fill{height:100%;border-radius:3px;background:var(--grad-gold);transition:width .9s cubic-bezier(.22,1,.36,1);}
.divider{height:1px;background:var(--border);margin:14px 0;}
.credits-row{display:flex;align-items:center;justify-content:space-between;}
.credits-val{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--gold2);}
.credits-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}

/* EQUIPPED MINI SLOTS on char card */
.equip-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:10px;}
.equip-slot{aspect-ratio:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;position:relative;cursor:pointer;transition:border-color .18s;}
.equip-slot:hover{border-color:var(--border2);}
.equip-slot.filled{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.04);}
.equip-icon{font-size:16px;}
.equip-label{font-size:7px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);}
.equip-slot.filled .equip-label{color:var(--gold);}
.rarity-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;}
.r-common{background:#777;}.r-rare{background:var(--blue);}.r-epic{background:var(--purple);}.r-legendary{background:var(--gold);}

/* DEBUFF */
.debuff-banner{margin-top:10px;background:rgba(255,61,61,.08);border:1px solid rgba(255,61,61,.2);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;animation:fadeUp .3s ease;}
.debuff-text{font-size:11px;color:#ff9d9d;flex:1;}
.debuff-timer{font-family:var(--font-d);font-size:11px;color:var(--red);}
.reset-chip{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;margin-top:8px;}

/* STAT WINDOW (list style, compact) */
.stat-window{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.stat-window-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);}
.stat-window-title{font-family:var(--font-d);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.stat-window-month{font-size:9px;color:var(--muted);letter-spacing:.5px;}
.stat-list-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px;transition:background .15s;}
.stat-list-row:last-child{border-bottom:none;}
.stat-list-row:hover{background:rgba(255,255,255,.02);}
.stat-list-emoji{font-size:13px;width:18px;flex-shrink:0;}

.stat-list-bar-wrap{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.stat-list-bar{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.22,1,.36,1);}
.stat-list-middle{display:flex;flex-direction:column;gap:1px;flex-shrink:0;width:72px;}
.stat-list-label{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.stat-list-breakdown{font-size:9px;color:var(--green);letter-spacing:.3px;}
.stat-list-nums{display:flex;flex-direction:column;align-items:flex-end;gap:1px;width:32px;flex-shrink:0;}
.stat-list-val{font-family:var(--font-d);font-size:13px;font-weight:700;line-height:1;}
.stat-list-base{font-size:9px;color:var(--muted);line-height:1;}
.stat-legend-row{display:flex;justify-content:flex-end;gap:16px;padding:4px 14px 6px;border-bottom:1px solid var(--border);}
.stat-legend-item{font-size:9px;letter-spacing:.5px;text-transform:uppercase;}
.stat-list-bonus{font-size:9px;color:var(--gold);flex-shrink:0;}
.stat-list-debuff{font-size:9px;color:var(--red);}
.sl-str .stat-list-bar{background:var(--pink);} .sl-str .stat-list-val{color:var(--pink);}
.sl-int .stat-list-bar{background:var(--purple);} .sl-int .stat-list-val{color:#c084fc;}
.sl-def .stat-list-bar{background:var(--blue);} .sl-def .stat-list-val{color:#60a5fa;}
.sl-agi .stat-list-bar{background:var(--teal);} .sl-agi .stat-list-val{color:var(--teal);}
.sl-lck .stat-list-bar{background:var(--amber);} .sl-lck .stat-list-val{color:var(--amber);}

/* IDENTITY FOOTER on stat window */
.identity-footer{padding:10px 14px;border-top:1px solid var(--border);background:rgba(255,255,255,.015);}
.identity-logged{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.identity-nick{font-size:12px;color:var(--text);font-weight:600;letter-spacing:.3px;}
.identity-role{font-size:9px;color:var(--muted);margin-top:1px;}

/* GAME NAME FIELD on char card */
.game-name-row{display:flex;align-items:center;gap:6px;margin-bottom:2px;justify-content:center;}
.game-name-display{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--text);letter-spacing:.5px;cursor:pointer;}
.game-name-display:hover{color:var(--gold2);}
.game-name-input{font-family:var(--font-d);font-size:16px;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.4);border-radius:6px;padding:3px 8px;color:var(--text);outline:none;text-align:center;width:160px;}
.game-name-edit-btn{font-size:10px;color:var(--muted);cursor:pointer;transition:color .15s;background:none;border:none;padding:0;}
.game-name-edit-btn:hover{color:var(--gold);}

/* RIGHT COLUMN TABS */
.right-col{display:flex;flex-direction:column;gap:0;}
.rtabs{display:flex;gap:0;border-bottom:1px solid var(--border2);margin-bottom:16px;}
.rtab{font-family:var(--font-d);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s;background:none;border-top:none;border-left:none;border-right:none;}
.rtab:hover{color:var(--text);}
.rtab.active{color:var(--gold);border-bottom-color:var(--gold);}
.rtab-panel{display:none;animation:slideIn .2s ease;}
.rtab-panel.active{display:block;}

/* PANELS */
.panel{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:14px;}
.panel:last-child{margin-bottom:0;}
.panel-title{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.3),transparent);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat-block{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px;position:relative;overflow:hidden;}
.stat-block::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px;}
.sb-str::before{background:var(--pink);}
.sb-int::before{background:var(--purple);}
.sb-def::before{background:var(--blue);}
.sb-agi::before{background:var(--teal);}
.sb-lck::before{background:var(--amber);}
.stat-emoji{font-size:11px;margin-bottom:4px;display:block;}
.stat-name{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.stat-val{font-family:var(--font-d);font-size:24px;font-weight:700;line-height:1;margin-bottom:2px;}
.sb-str .stat-val{color:var(--pink);}
.sb-int .stat-val{color:#c084fc;}
.sb-def .stat-val{color:#60a5fa;}
.sb-agi .stat-val{color:var(--teal);}
.sb-lck .stat-val{color:var(--amber);}
.stat-src{font-size:9px;color:var(--muted2);margin-bottom:7px;line-height:1.4;}
.stat-bar-bg{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width 1.1s cubic-bezier(.22,1,.36,1);}
.sb-str .stat-bar-fill{background:var(--pink);}
.sb-int .stat-bar-fill{background:var(--purple);}
.sb-def .stat-bar-fill{background:var(--blue);}
.sb-agi .stat-bar-fill{background:var(--teal);}
.sb-lck .stat-bar-fill{background:var(--amber);}
.stat-debuffed .stat-val::after{content:'▼';font-size:10px;color:var(--red);margin-left:4px;vertical-align:middle;}
.debuff-tag{font-size:8px;color:var(--red);letter-spacing:.5px;margin-top:3px;}
.stat-bonus{font-size:9px;color:var(--gold);margin-top:2px;}

/* ACTIVITY */
.act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.act-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;text-align:center;}
.act-val{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px;}
.act-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.act-delta{font-size:10px;margin-top:3px;}
.delta-up{color:var(--green);}
.delta-neutral{color:var(--muted);}

/* ── INVENTORY ── */
.inv-equipped-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.inv-equip-slot{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;min-height:95px;justify-content:center;}
.inv-equip-slot.has-item{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.04);}
.inv-slot-icon{font-size:22px;}
.inv-slot-name{font-size:11px;font-weight:600;color:var(--text);text-align:center;line-height:1.3;}
.inv-slot-stat{font-size:10px;color:var(--green);}
.inv-slot-stat.neg{color:var(--red);}
.inv-slot-type{font-size:9px;color:var(--muted);}
.inv-rarity-pip{position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;}
.unequip-x{position:absolute;top:5px;left:5px;width:16px;height:16px;border-radius:50%;background:rgba(255,61,61,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:9px;color:var(--red);}
.inv-equip-slot:hover .unequip-x{opacity:1;}
.inv-empty{color:var(--muted2);opacity:.4;font-size:11px;}

.bag-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.bag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.bag-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:3px;position:relative;transition:border-color .15s;}
.bag-card:hover{border-color:var(--border2);}
.bag-card.is-equipped{opacity:.5;}
.bag-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:3px;}
.bag-icon{font-size:20px;}
.bag-name{font-size:12px;font-weight:600;color:var(--text);}
.bag-stat{font-size:11px;color:var(--green);}
.bag-stat.neg{color:var(--red);}
.bag-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-top:2px;}
.equipped-badge{font-size:9px;background:rgba(29,209,122,.1);color:var(--green);border:1px solid rgba(29,209,122,.2);border-radius:4px;padding:2px 6px;display:inline-block;margin-top:4px;}
.equip-btn{width:100%;margin-top:6px;padding:5px;background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:10px;cursor:pointer;transition:all .15s;font-family:var(--font-b);}
.equip-btn:hover{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.3);color:var(--gold);}
.r-tag{font-size:9px;letter-spacing:.8px;text-transform:uppercase;padding:1px 5px;border-radius:3px;display:inline-block;}
.r-tag.common{background:rgba(120,120,120,.12);color:#888;}

};

/* ── State ── */
let cu=null, teamDir={}, perfData={}, credData={}, kcData={}, callData=[], moodData=[], attData={}, unoData={}, rpgData={};
let _currentViewNick = null;
let _activeTab = 'character';
let _shopFilter = 'all';
let _debuffInterval = null;
const unsubs = [];

/* ── Date helpers ── */
function getSydneyDateStr(){try{return new Date().toLocaleDateString('en-CA',{timeZone:'Australia/Sydney'});}catch(e){return new Date().toISOString().slice(0,10);}}
function getSydneyDate(){return new Date(getSydneyDateStr()+'T00:00:00Z');}
function todayKey(){return getSydneyDateStr();}
function monthKey(){return getSydneyDateStr().slice(0,7);}
function weekKey(){const d=getSydneyDate();const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()-day+1);return d.toISOString().slice(0,10);}
function safeDateBack(base,n){try{const d=new Date(base);d.setUTCDate(d.getUTCDate()-n);return d.toISOString().slice(0,10);}catch(e){return '';}}
function isWeekday(s){const d=new Date(s+'T00:00:00Z');const w=d.getUTCDay();return w>=1&&w<=5;}
function inThisMonth(s){return typeof s==='string'&&s.startsWith(monthKey());}
function inThisWeek(s){
  if(typeof s!=='string') return false;
  const wStart = weekKey();
  const d = new Date(s+'T00:00:00Z');
  const wEnd = new Date(wStart+'T00:00:00Z');
  wEnd.setUTCDate(wEnd.getUTCDate()+6);
  const ds = new Date(s+'T00:00:00Z');
  return ds >= new Date(wStart+'T00:00:00Z') && ds <= wEnd;
}
function daysLeftInMonth(){const n=getSydneyDate();const e=new Date(Date.UTC(n.getUTCFullYear(),n.getUTCMonth()+1,0));return e.getUTCDate()-n.getUTCDate();}

/* ── Item helpers ── */
function getEquipped(nick){return rpgData[nick]?.equippedItems||{};}
function getInventory(nick){return rpgData[nick]?.inventory||[];}
function isOwned(nick,itemId){return getInventory(nick).includes(itemId)||Object.values(getEquipped(nick)).some(e=>e&&e.id===itemId);}
function isEquippedInSlot(nick,slot){return !!(getEquipped(nick)[slot]);}

/* item stat bonuses currently equipped */
function equippedBonuses(nick){
  const bonuses={str:0,int:0,def:0,agi:0,lck:0,creditBonus:0,debuffResist:0};
  Object.values(getEquipped(nick)).forEach(item=>{
    if(!item) return;
    Object.entries(item.stats||{}).forEach(([k,v])=>{if(bonuses[k]!==undefined) bonuses[k]+=v;});
    if(item.creditBonus) bonuses.creditBonus+=item.creditBonus;
    if(item.debuffResist) bonuses.debuffResist+=item.debuffResist;
  });
  return bonuses;
}

/* ── Debuff helpers ── */
function getActiveDebuffs(nick){const d=rpgData[nick]?.debuffs||[];const now=Date.now();return d.filter(x=>x.expiresAt>now);}
function debuffAmount(nick,stat){return getActiveDebuffs(nick).filter(d=>d.stat===stat).reduce((s,d)=>s+d.amount,0);}
function debuffMinutesLeft(d){return Math.max(0,Math.ceil((d.expiresAt-Date.now())/60000));}

/* ── Stat calculations ── */

/* Base stat helpers */
function getBaseStats(nick){ return rpgData[nick]?.baseStats||{str:0,int:0,def:0,agi:0,lck:0}; }
function calcBaseForLevel(level){ return Math.min(BASE_STAT_START+(level-1)*BASE_STAT_STEP, BASE_STAT_CAP); }
function getStatBase(nick,stat){
  const bs=getBaseStats(nick);
  const {level}=calcLevel(calcXP(nick));
  // If player has manually allocated this stat, use it; otherwise default to level cap
  if(bs[stat]!==undefined && bs[stat]>0) return Math.min(bs[stat], calcBaseForLevel(level));
  return Math.min(calcBaseForLevel(level), BASE_STAT_CAP);
}

/* Bonus calculations — weekly KPI based, floor at 0 */
function bonusSTR(nick){
  try{
    const days=Object.keys(perfData[nick]||{}).filter(d=>inThisWeek(d)&&isWeekday(d));
    if(!days.length) return 0;
    const avg=days.reduce((s,d)=>s+(perfData[nick][d]?.uploadsTotal||0),0)/days.length;
    if(avg<=0) return 0;
    return Math.max(0, Math.round(((avg-DAILY_KPI)/avg)*100));
  }catch(e){return 0;}
}
function bonusDEF(nick){
  try{
    let count=0;
    const today=getSydneyDate();
    for(let i=0;i<7;i++){
      const key=safeDateBack(today,i);
      if(!key||!isWeekday(key)) continue;
      const att=attData[nick+'_'+key];
      if(att&&(att.status==='present'||att.status==='late')) count++;
    }
    return Math.min(count,5);
  }catch(e){return 0;}
}
function bonusAGI(nick){
  try{
    const days=Object.keys(perfData[nick]||{}).filter(d=>inThisWeek(d)&&isWeekday(d));
    const total=days.reduce((s,d)=>s+(perfData[nick][d]?.uploadsTotal||0),0);
    if(!total) return 0;
    const errors=callData.filter(c=>c.uploader===nick&&c.type==='qscore'&&inThisWeek(c.date)&&c.status!=='pending_review'&&c.status!=='discarded').length;
    const qesc=callData.filter(c=>c.uploader===nick&&c.type==='qesc'&&inThisWeek(c.date)).length;
    const actual=Math.round(((total-errors-qesc)/total)*100);
    if(actual<=0) return 0;
    return Math.max(0, Math.round(((actual-QUALITY_TARGET)/actual)*100));
  }catch(e){return 0;}
}
function bonusLCK(nick){
  try{
    const today=todayKey();
    const moods=moodData.filter(m=>m.nick===nick&&m.date===today);
    if(!moods.length) return 0;
    return Math.max(0, Math.round(moods.reduce((s,m)=>s+(m.score||0),0)/moods.length));
  }catch(e){return 0;}
}
function bonusINT(nick){
  try{
    const kc=kcData[nick+'_'+weekKey()];
    if(!kc||!kc.score) return 0;
    return Math.max(0, Math.round(kc.score/2));
  }catch(e){return 0;}
}

/* Total stat = base + bonus + items + debuff */
function calcStat(nick,stat){
  const base  = getStatBase(nick,stat);
  const bonus = {str:bonusSTR,def:bonusDEF,agi:bonusAGI,lck:bonusLCK,int:bonusINT}[stat]?.(nick)||0;
  const items = equippedBonuses(nick)[stat]||0;
  const debuff= debuffAmount(nick,stat);
  return {base,bonus,items,debuff,total:Math.max(0,base+bonus+items+debuff)};
}
function calcSTR(nick){return calcStat(nick,'str').total;}
function calcINT(nick){return calcStat(nick,'int').total;}
function calcDEF(nick){return calcStat(nick,'def').total;}
function calcAGI(nick){return calcStat(nick,'agi').total;}
function calcLCK(nick){return calcStat(nick,'lck').total;}

function calcXP(nick){try{return Object.values(perfData[nick]||{}).reduce((s,d)=>s+(typeof d==='object'?d.uploadsTotal||0:0),0)*10;}catch(e){return 0;}}
function calcLevel(xp){let l=1,n=500,c=xp;while(c>=n){c-=n;l++;n+=200;if(l>=40)break;}return{level:l,current:c,needed:n};}
function calcCredits(nick){const base=credData[nick]?.credits||0;return base;}
function todayUploads(nick){return perfData[nick]?.[todayKey()]?.uploadsTotal||0;}
function monthUploads(nick){return Object.keys(perfData[nick]||{}).filter(d=>inThisMonth(d)).reduce((s,d)=>s+(perfData[nick][d]?.uploadsTotal||0),0);}

/* ── Misc helpers ── */
function classFromRole(role){if(role==='manager')return{label:'Game Master',key:'gamemaster',emoji:'👑'};if(role==='escalation')return{label:'Sentinel',key:'sentinel',emoji:'🛡'};return{label:'Archivist',key:'archivist',emoji:'📜'};}
function titleFromLevel(l){if(l>=30)return'Mythic Legend';if(l>=25)return'Grand Master';if(l>=20)return'Legendary Archivist';if(l>=15)return'Elite Operative';if(l>=10)return'Seasoned Agent';if(l>=5)return'Field Agent';return'Initiate';}
function auraColor(cls){if(cls==='gamemaster')return'rgba(201,168,76,.3)';if(cls==='sentinel')return'rgba(0,212,180,.25)';return'rgba(139,45,255,.25)';}
function initials(name){return(name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function rarityColor(r){const m={common:'#777',rare:'#2d7fff',epic:'#8b2dff',legendary:'#c9a84c'};return m[r]||'#777';}

/* ── Toast ── */
let _toastTimer=null;
function showToast(msg,isErr=false){
  let t=document.getElementById('realm-toast');
  if(!t){t=document.createElement('div');t.id='realm-toast';document.body.appendChild(t);}
  t.className='toast'+(isErr?' err':'');
  t.textContent=msg;
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2500);
}

/* ── Sprite SVG ── */
function buildSpriteSVG(cls){
  const T={archivist:{body:'#2d1b69',glow:'#8b2dff',eye:'#c084fc',gem:'#f72b6e',gemLit:'#ff9eb5',r1:'#8b2dff',r2:'#6d28d9',wa:'#a78bfa',wb:'#f72b6e',wc:'#f0cc6e'},sentinel:{body:'#082e24',glow:'#00d4b4',eye:'#5eead4',gem:'#2d7fff',gemLit:'#93c5fd',r1:'#00d4b4',r2:'#0f766e',wa:'#5eead4',wb:'#2d7fff',wc:'#00d4b4'},gamemaster:{body:'#2c1a06',glow:'#c9a84c',eye:'#f0cc6e',gem:'#c9a84c',gemLit:'#fef3c7',r1:'#c9a84c',r2:'#92400e',wa:'#f0cc6e',wb:'#c9a84c',wc:'#fbbf24'}};
  const t=T[cls]||T.archivist;
  const hat=cls==='gamemaster'?`<rect x="30" y="4" width="40" height="14" rx="3" fill="${t.body}"/><rect x="24" y="14" width="52" height="6" rx="2" fill="${t.body}"/><circle cx="50" cy="4" r="4" fill="${t.gem}" opacity=".9"/>`:cls==='sentinel'?`<path d="M30 18 Q50 2 70 18 L70 10 Q50 -4 30 10 Z" fill="${t.body}"/>`:``+`<rect x="32" y="4" width="36" height="14" rx="5" fill="${t.body}"/><rect x="28" y="14" width="44" height="5" rx="2" fill="${t.body}"/>`;
  const wpn=cls==='sentinel'?`<rect x="90" y="8" width="4" height="58" rx="2" fill="${t.wa}" opacity=".85"/><rect x="84" y="22" width="16" height="4" rx="2" fill="${t.wb}"/><polygon points="92,4 88.5,18 95.5,18" fill="${t.wa}"/>`:cls==='gamemaster'?`<rect x="89" y="18" width="4" height="52" rx="2" fill="${t.wa}" opacity=".85"/><circle cx="91" cy="14" r="8" fill="${t.wb}" opacity=".3"/><circle cx="91" cy="14" r="5" fill="${t.wa}" opacity=".9"/><circle cx="91" cy="14" r="2" fill="${t.wc}"/>`:``+`<rect x="90" y="22" width="4" height="52" rx="1.5" fill="${t.wa}" opacity=".85"/><rect x="84" y="36" width="16" height="3" rx="1" fill="${t.wb}"/><rect x="88" y="14" width="8" height="20" rx="2" fill="${t.wc}" opacity=".85"/>`;
  return `<svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg" width="110" height="110" style="overflow:visible">
    <defs><radialGradient id="ag-${cls}" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="${t.glow}" stop-opacity="0.18"/><stop offset="100%" stop-color="${t.glow}" stop-opacity="0"/></radialGradient></defs>
    <ellipse cx="52" cy="56" rx="36" ry="36" fill="url(#ag-${cls})"/>
    <ellipse cx="52" cy="56" rx="30" ry="30" fill="none" stroke="${t.r1}" stroke-width="0.5" opacity=".3"/>
    <ellipse cx="50" cy="104" rx="18" ry="3.5" fill="${t.glow}" opacity=".1"/>
    <g class="svg-weapon">${wpn}</g>
    <g class="svg-body">
      <rect x="30" y="74" width="12" height="24" rx="5" fill="${t.body}"/><rect x="48" y="74" width="12" height="24" rx="5" fill="${t.body}"/>
      <rect x="30" y="91" width="12" height="7" rx="3" fill="${t.glow}" opacity=".18"/><rect x="48" y="91" width="12" height="7" rx="3" fill="${t.glow}" opacity=".18"/>
      <rect x="21" y="44" width="56" height="32" rx="9" fill="${t.body}"/>
      <rect x="15" y="44" width="14" height="10" rx="5" fill="${t.body}"/><rect x="79" y="44" width="14" height="10" rx="5" fill="${t.body}"/>
      <rect x="9" y="46" width="16" height="24" rx="7" fill="${t.body}"/><rect x="83" y="46" width="16" height="24" rx="7" fill="${t.body}"/>
      <rect x="9" y="63" width="16" height="7" rx="4" fill="${t.glow}" opacity=".18"/><rect x="83" y="63" width="16" height="7" rx="4" fill="${t.glow}" opacity=".18"/>
      <rect x="42" y="53" width="14" height="14" rx="3" class="svg-gem" fill="${t.gem}" opacity=".7"/>
      <rect x="46" y="57" width="6" height="6" rx="1" class="svg-gem" fill="${t.gemLit}" opacity=".9"/>
      <rect x="29" y="48" width="30" height="2" rx="1" fill="${t.glow}" opacity=".12"/>
      <rect x="41" y="34" width="16" height="12" rx="4" fill="${t.body}"/>
      <ellipse cx="49" cy="22" rx="20" ry="20" fill="${t.body}"/>
      ${hat}
      <g class="svg-eyes">
        <circle cx="42" cy="22" r="4" fill="${t.glow}" opacity=".3"/><circle cx="56" cy="22" r="4" fill="${t.glow}" opacity=".3"/>
        <circle cx="42" cy="22" r="2.5" fill="${t.eye}"/><circle cx="56" cy="22" r="2.5" fill="${t.eye}"/>
        <circle cx="42" cy="21" r="1" fill="#fff" opacity=".6"/><circle cx="56" cy="21" r="1" fill="#fff" opacity=".6"/>
      </g>
    </g>
  </svg>`;
}

/* ── Render character card (left col — always visible) ── */
function renderCharCard(nick){
  const member=teamDir[nick]||{};
  const role=member.role||(nick===cu?.nickname?cu.role:'uploader');
  const cls=classFromRole(role);
  const xp=calcXP(nick);
  const{level,current:xpCur,needed:xpNeeded}=calcLevel(xp);
  const xpPct=Math.min(Math.round((xpCur/xpNeeded)*100),100);
  const credits=calcCredits(nick);
  const equipped=getEquipped(nick);
  const activeDebuffs=getActiveDebuffs(nick);
  const dLeft=daysLeftInMonth();

  const miniSlots=['weapon','armor','ring','cape'].map(slot=>{
    const item=equipped[slot];
    return `<div class="equip-slot ${item?'filled':''}" title="${item?item.name:slot}">
      ${item?`<div class="rarity-dot r-${item.rarity}"></div>`:''}
      <div class="equip-icon">${item?item.emoji:({weapon:'⚔️',armor:'🛡',ring:'💍',cape:'🧣'}[slot])}</div>
      <div class="equip-label">${item?item.name.slice(0,6):slot}</div>
    </div>`;
  }).join('');

  const debuffBanner=activeDebuffs.length?`
    <div class="debuff-banner">
      <span style="font-size:16px">⚠️</span>
      <span class="debuff-text"><strong>Debuff</strong> — ${activeDebuffs[0].stat.toUpperCase()} ${activeDebuffs[0].amount} (${debuffMinutesLeft(activeDebuffs[0])}m left)</span>
    </div>`:'';

  const gameName = rpgData[nick]?.gameName || member.fullName || cu?.fullName || nick;
  const isOwnCard = nick === cu?.nickname;

  return `
    <div class="char-card" id="char-card-${nick}">
      <div class="char-sprite-wrap">
        <div class="char-sprite">
          <div class="char-aura" style="background:radial-gradient(circle,${auraColor(cls.key)},transparent 70%);"></div>
          <div class="char-svg-wrap">${buildSpriteSVG(cls.key)}</div>
          <div class="char-level-badge">${level}</div>
        </div>
      </div>
      <div class="game-name-row">
        <span class="game-name-display" id="gname-display-${nick}" onclick="${isOwnCard?`startEditName('${nick}')`:''}" title="${isOwnCard?'Click to change character name':''}">${gameName}</span>
        ${isOwnCard?`<button class="game-name-edit-btn" onclick="startEditName('${nick}')" title="Edit name">✏</button>`:''}
      </div>
      <div class="char-class ${cls.key}">${cls.emoji} ${cls.label}</div>
      <div class="char-title-txt">${titleFromLevel(level)}</div>
      <div class="xp-row"><span>XP</span><span>${xpCur.toLocaleString()}/${xpNeeded.toLocaleString()}</span></div>
      <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
      <div class="credits-row">
        <div><div class="credits-label">Credits</div></div>
        <div class="credits-val">⬡ ${credits.toLocaleString()}</div>
      </div>
      <div class="divider"></div>
      <div style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Equipment</div>
      <div class="equip-grid">${miniSlots}</div>
      ${debuffBanner}
      <div class="reset-chip">🔄 Stats reset in ${dLeft} day${dLeft!==1?'s':''}</div>
    </div>`;
}

/* ── Render right column with tabs ── */
function renderRightCol(nick){
  const isManager=(cu?.role==='manager' && nick!==cu?.nickname);
  return `
    <div class="right-col">
      <div class="rtabs">
        <button class="rtab ${_activeTab==='character'?'active':''}" onclick="switchRTab('character','${nick}')">Character</button>
        <button class="rtab ${_activeTab==='inventory'?'active':''}" onclick="switchRTab('inventory','${nick}')">Inventory</button>
        ${!isManager?`<button class="rtab ${_activeTab==='shop'?'active':''}" onclick="switchRTab('shop','${nick}')">Shop</button>`:''}
      </div>
      <div class="rtab-panel ${_activeTab==='character'?'active':''}" id="rtab-character">${renderCharacterTab(nick)}</div>
      <div class="rtab-panel ${_activeTab==='inventory'?'active':''}" id="rtab-inventory">${renderInventoryTab(nick)}</div>
      ${!isManager?`<div class="rtab-panel ${_activeTab==='shop'?'active':''}" id="rtab-shop">${renderShopTab(nick)}</div>`:''}
    </div>`;
}

/* ── Character tab ── */
function renderCharacterTab(nick){
  const str=calcSTR(nick),int_=calcINT(nick),def=calcDEF(nick),agi=calcAGI(nick),lck=calcLCK(nick);
  const bonuses=equippedBonuses(nick);
  const activeDebuffs=getActiveDebuffs(nick);
  const month=new Date().toLocaleString('default',{month:'long'})+' '+getSydneyDate().getUTCFullYear();

  const member2 = teamDir[nick]||{};
  const role2 = member2.role||(nick===cu?.nickname?cu.role:'uploader');
  const cls2 = classFromRole(role2);
  const gameName2 = rpgData[nick]?.gameName || member2.fullName || cu?.fullName || nick;

  const statRow=(key,emoji,label)=>{
    const s = calcStat(nick, key);
    const isDebuffed = activeDebuffs.some(d=>d.stat===key);
    const pct = Math.max(0, Math.min(s.total, 100));
    const bonusLine = [
      s.bonus>0 ? `+${s.bonus} KPI` : '',
      s.items>0 ? `+${s.items} gear` : '',
      s.debuff<0 ? `${s.debuff} debuff` : '',
    ].filter(Boolean).join(' · ');
    return `<div class="stat-list-row sl-${key}">
      <span class="stat-list-emoji">${emoji}</span>
      <div class="stat-list-middle">
        <span class="stat-list-label">${label}</span>
        ${bonusLine?`<span class="stat-list-breakdown">${bonusLine}</span>`:''}
      </div>
      <div class="stat-list-bar-wrap"><div class="stat-list-bar" style="width:${pct}%"></div></div>
      <div class="stat-list-nums">
        <span class="stat-list-val">${s.total}</span>
        <span class="stat-list-base">${s.base}</span>
      </div>
      ${isDebuffed?`<span class="stat-list-debuff">▼</span>`:''}
    </div>`;
  };

  const {level:lv2} = calcLevel(calcXP(nick));
  const basePool = calcBaseForLevel(lv2);

  return `
    <div class="stat-window">
      <div class="stat-window-header">
        <span class="stat-window-title">Core Stats</span>
        <span class="stat-window-month">${month}</span>
      </div>
      <div class="stat-legend-row">
        <span class="stat-legend-item" style="color:var(--text)">Total</span>
        <span class="stat-legend-item" style="color:var(--muted)">Base (cap ${basePool})</span>
      </div>
      ${statRow('str','⚡','Output')}
      ${statRow('int','🧠','Knowledge')}
      ${statRow('def','🛡','Reliability')}
      ${statRow('agi','💨','Precision')}
      ${statRow('lck','🎲','Morale')}
      ${nick===cu?.nickname?`
      <div style="padding:10px 14px;border-top:1px solid var(--border);background:rgba(255,255,255,.015);">
        <div style="font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Upgrade base stats · ⬡ ${BASE_UPGRADE_COST} per point</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${['str','int','def','agi','lck'].map(st=>{
            const s=calcStat(nick,st);
            const {level:lv3}=calcLevel(calcXP(nick));
            const cap3=calcBaseForLevel(lv3);
            const atCap=s.base>=cap3;
            const canAfford=calcCredits(nick)>=BASE_UPGRADE_COST;
            return \`<button onclick="doUpgradeBase('${nick}','\${st}')" style="font-size:10px;padding:4px 10px;border-radius:6px;border:1px solid \${atCap?'rgba(255,255,255,.06)':canAfford?'rgba(201,168,76,.3)':'rgba(255,255,255,.1)'};background:transparent;color:\${atCap?'var(--muted)':canAfford?'var(--gold)':'var(--muted)'};cursor:\${atCap?'not-allowed':'pointer'};font-family:var(--font-b);" \${atCap?'disabled':''}>\${st.toUpperCase()} \${s.base}\${atCap?'(max)':'+1'}</button>\`;
          }).join('')}
        </div>
      </div>`:''}
      <div class="identity-footer">
        <div class="identity-logged">Logged in as</div>
        <div class="identity-nick">${nick}</div>
        <div class="identity-role">${cls2.emoji} ${cls2.label} · ${gameName2}</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Activity</div>
      <div class="act-grid">
        <div class="act-card">
          <div class="act-val">${todayUploads(nick)}</div>
          <div class="act-label">Today</div>
          <div class="act-delta ${todayUploads(nick)>0?'delta-up':'delta-neutral'}">${todayUploads(nick)>0?'+'+(todayUploads(nick)*10)+' XP':'No uploads yet'}</div>
        </div>
        <div class="act-card">
          <div class="act-val">${monthUploads(nick).toLocaleString()}</div>
          <div class="act-label">This month</div>
          <div class="act-delta delta-up">+${(monthUploads(nick)*10).toLocaleString()} XP</div>
        </div>
        <div class="act-card">
          <div class="act-val" style="color:var(--gold)">${calcLevel(calcXP(nick)).level}</div>
          <div class="act-label">Level</div>
          <div class="act-delta delta-neutral">${calcXP(nick).toLocaleString()} XP total</div>
        </div>
      </div>
    </div>`;
}

/* ── Inventory tab ── */
function renderInventoryTab(nick){
  const equipped=getEquipped(nick);
  const inventory=getInventory(nick);
  const isOwnProfile=nick===cu?.nickname;

  const equippedSlots=['weapon','armor','ring','cape'].map(slot=>{
    const item=equipped[slot];
    if(item){
      return `<div class="inv-equip-slot has-item">
        <div class="inv-rarity-pip" style="background:${rarityColor(item.rarity)}"></div>
        ${isOwnProfile?`<button class="unequip-x" onclick="doUnequip('${nick}','${slot}')" title="Unequip">✕</button>`:''}
        <div class="inv-slot-icon">${item.emoji}</div>
        <div class="inv-slot-name">${item.name}</div>
        ${Object.entries(item.stats||{}).map(([k,v])=>`<div class="inv-slot-stat ${v<0?'neg':''}">${v>0?'+':''}${v} ${k.toUpperCase()}</div>`).join('')}
        ${item.debuffResist?`<div class="inv-slot-stat">Debuff −${item.debuffResist}%</div>`:''}
        ${item.creditBonus?`<div class="inv-slot-stat">+${item.creditBonus}% credits</div>`:''}
        <div class="inv-slot-type">${slot}</div>
      </div>`;
    }
    return `<div class="inv-equip-slot">
      <div class="inv-slot-icon inv-empty">+</div>
      <div class="inv-slot-type">${slot}</div>
    </div>`;
  }).join('');

  const equippedIds=Object.values(equipped).filter(Boolean).map(i=>i.id);
  const bagItems=[...new Set([...inventory,...equippedIds])]
    .map(id=>ITEMS[id])
    .filter(Boolean)
    .sort((a,b)=>{const o={legendary:0,epic:1,rare:2,common:3};return o[a.rarity]-o[b.rarity];});

  const bagCards=bagItems.length?bagItems.map(item=>{
    const isEq=equippedIds.includes(item.id);
    const statLines=Object.entries(item.stats||{}).map(([k,v])=>`<div class="bag-stat ${v<0?'neg':''}">${v>0?'+':''}${v} ${k.toUpperCase()}</div>`).join('');
    return `<div class="bag-card ${isEq?'is-equipped':''}">
      <div class="bag-card-top">
        <div class="bag-icon">${item.emoji}</div>
        <span class="r-tag ${item.rarity}">${item.rarity}</span>
      </div>
      <div class="bag-name">${item.name}</div>
      ${statLines}
      ${item.debuffResist?`<div class="bag-stat">Debuff −${item.debuffResist}%</div>`:''}
      ${item.creditBonus?`<div class="bag-stat">+${item.creditBonus}% credits</div>`:''}
      <div class="bag-desc">${item.desc}</div>
      ${isEq?`<div class="equipped-badge">✓ Equipped</div>`
        :isOwnProfile?`<button class="equip-btn" onclick="doEquip('${nick}','${item.id}')">Equip in ${item.slot} slot</button>`:''}
    </div>`;
  }).join('')
  :`<div style="color:var(--muted);font-size:12px;padding:20px 0;">No items yet — visit the Shop to get started.</div>`;

  return `
    <div class="panel">
      <div class="panel-title">Equipped</div>
      <div class="inv-equipped-grid">${equippedSlots}</div>
      <div class="bag-label">Bag · ${bagItems.length} item${bagItems.length!==1?'s':''}</div>
      <div class="bag-grid">${bagCards}</div>
    </div>`;
}

/* ── Shop tab ── */
function renderShopTab(nick){
  const credits=calcCredits(nick);
  const{level}=calcLevel(calcXP(nick));
  const slots=['all','weapon','armor','ring','cape'];

  const filterBtns=slots.map(s=>`<button class="sf-btn ${_shopFilter===s?'on':''}" onclick="setShopFilter('${s}','${nick}')">${s==='all'?'All':s.charAt(0).toUpperCase()+s.slice(1)+'s'}</button>`).join('');

  const shopItems=Object.values(ITEMS)
    .filter(item=>item.shopVisible!==false||!item.dropOnly&&!item.awardOnly)
    .filter(item=>_shopFilter==='all'||item.slot===_shopFilter)
    .filter(item=>!item.dropOnly&&!item.awardOnly)
    .sort((a,b)=>{const o={common:0,rare:1,epic:2,legendary:3};return o[a.rarity]-o[b.rarity]||a.cost-b.cost;});

  const cards=shopItems.map(item=>{
    const owned=isOwned(nick,item.id);
    const locked=item.lockLevel>0&&level<item.lockLevel;
    const canAfford=credits>=item.cost;
    let cardClass=owned?'owned':locked?'locked':canAfford?'can-buy':'cant-afford';
    const statLines=Object.entries(item.stats||{}).map(([k,v])=>`<div class="shop-stat ${v<0?'neg':''}">${v>0?'+':''}${v} ${k.toUpperCase()}</div>`).join('');

    return `<div class="shop-card ${cardClass}">
      <span class="shop-slot-tag">${item.slot}</span>
      <div class="shop-icon">${item.emoji}</div>
      <span class="r-tag ${item.rarity}">${item.rarity}</span>
      <div class="shop-name">${item.name}</div>
      ${statLines}
      ${item.debuffResist?`<div class="shop-stat spec">Debuff −${item.debuffResist}%</div>`:''}
      ${item.creditBonus?`<div class="shop-stat">+${item.creditBonus}% credits</div>`:''}
      <div class="shop-desc">${item.desc}</div>
      <div class="shop-price-row">
        ${owned
          ?`<span class="owned-tag">✓ Owned</span>`
          :locked
          ?`<span class="lock-tag">🔒 Lv ${item.lockLevel} required</span>`
          :`<span class="shop-price">⬡ ${item.cost.toLocaleString()}</span>
            <button class="buy-btn" ${!canAfford?'disabled':''} onclick="doBuy('${nick}','${item.id}')">Buy</button>`
        }
      </div>
    </div>`;
  }).join('');

  return `
    <div class="panel">
      <div class="panel-title" style="margin-bottom:12px;">Shop</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="shop-filters">${filterBtns}</div>
        <div style="font-size:12px;color:var(--gold);font-family:var(--font-d);">⬡ ${credits.toLocaleString()}</div>
      </div>
      <div class="shop-grid">${cards}</div>
    </div>`;
}

/* ── Equip / Unequip / Buy ── */
window.doEquip = async function(nick,itemId){
  if(nick!==cu?.nickname){showToast('You can only equip your own gear.',true);return;}
  const item=ITEMS[itemId];
  if(!item){showToast('Unknown item.',true);return;}
  try{
    const ref=doc(db,'rpg_profile',nick);
    const newEquipped={...getEquipped(nick),[item.slot]:{id:item.id,name:item.name,emoji:item.emoji,rarity:item.rarity,stats:item.stats||{},debuffResist:item.debuffResist||0,creditBonus:item.creditBonus||0}};
    await updateDoc(ref,{equippedItems:newEquipped});
    showToast(`${item.emoji} ${item.name} equipped!`);
  }catch(e){console.error(e);showToast('Failed to equip. Try again.',true);}
};

window.doUnequip = async function(nick,slot){
  if(nick!==cu?.nickname){showToast('You can only manage your own gear.',true);return;}
  try{
    const ref=doc(db,'rpg_profile',nick);
    const newEquipped={...getEquipped(nick),[slot]:null};
    await updateDoc(ref,{equippedItems:newEquipped});
    showToast(`${slot.charAt(0).toUpperCase()+slot.slice(1)} slot cleared.`);
  }catch(e){console.error(e);showToast('Failed to unequip.',true);}
};

window.doBuy = async function(nick,itemId){
  if(nick!==cu?.nickname){showToast('You can only buy for yourself.',true);return;}
  const item=ITEMS[itemId];
  if(!item){showToast('Unknown item.',true);return;}
  const credits=calcCredits(nick);
  if(credits<item.cost){showToast('Not enough credits.',true);return;}
  if(isOwned(nick,itemId)){showToast('You already own this item.',true);return;}
  try{
    const ref=doc(db,'rpg_profile',nick);
    const credRef=doc(db,'player_credits',nick);
    const newInv=[...getInventory(nick),itemId];
    await updateDoc(ref,{inventory:newInv});
    await updateDoc(credRef,{credits:credits-item.cost});
    showToast(`${item.emoji} ${item.name} purchased!`);
  }catch(e){console.error(e);showToast('Purchase failed. Try again.',true);}
};

window.switchRTab = function(tab,nick){
  _activeTab=tab;
  document.querySelectorAll('.rtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.rtab-panel').forEach(p=>p.classList.remove('active'));
  const btn=document.querySelector(`.rtab[onclick*="'${tab}'"]`);
  const panel=document.getElementById('rtab-'+tab);
  if(btn) btn.classList.add('active');
  if(panel) panel.classList.add('active');
  if(tab==='inventory') panel.innerHTML=renderInventoryTab(nick);
  if(tab==='shop') panel.innerHTML=renderShopTab(nick);
  if(tab==='character') panel.innerHTML=renderCharacterTab(nick);
};

window.setShopFilter = function(slot,nick){
  _shopFilter=slot;
  const panel=document.getElementById('rtab-shop');
  if(panel) panel.innerHTML=renderShopTab(nick);
};

/* ── Full render ── */
function renderCharacter(nick){
  try{
    _currentViewNick=nick;
    const member=teamDir[nick]||{};

    if(cu?.role==='manager'&&nick!==cu.nickname){
      document.getElementById('tb-title').innerHTML=
        `<span class="console-back" onclick="goConsole()">← Console</span>
         <span style="color:var(--muted);margin:0 8px">·</span>
         <span style="font-size:15px">${member.fullName||nick}</span>`;
    } else {
      document.getElementById('tb-title').textContent='Character';
    }

    const grid=document.getElementById('realm-grid');
    grid.style.gridTemplateColumns='280px 1fr';
    grid.innerHTML=renderCharCard(nick)+renderRightCol(nick);
  }catch(err){console.error('renderCharacter:',err);}
}

function renderManagerView(){
  document.getElementById('tb-title').textContent='Game Master';
  const members=Object.entries(teamDir)
    .filter(([,m])=>m.role!=='manager')
    .sort((a,b)=>calcXP(b[0])-calcXP(a[0]))
    .map(([nick,m])=>{
      const{level}=calcLevel(calcXP(nick));
      const cls=classFromRole(m.role);
      const bg=m.role==='escalation'?'linear-gradient(135deg,#082e24,#00d4b4)':'linear-gradient(135deg,#2d1b69,#8b2dff)';
      return `<div class="team-mini" onclick="window._rpgViewMember('${nick}')">
        <div class="team-mini-av" style="background:${bg}">${initials(m.fullName)}</div>
        <div class="team-mini-name">${m.fullName}</div>
        <div class="team-mini-class">${cls.emoji} ${cls.label}</div>
        <div class="team-mini-lv">Lv ${level}</div>
      </div>`;
    }).join('');
  const grid=document.getElementById('realm-grid');
  grid.style.gridTemplateColumns='1fr';
  grid.innerHTML=`<div>
    <div class="manager-banner">
      <div class="manager-crown">👑</div>
      <div class="manager-title">Game Master Console</div>
      <div class="manager-desc">Oversee your agents' growth. Stats reset monthly. Equipment and rewards carry over.</div>
    </div>
    <div class="team-grid">${members}</div>
  </div>`;
}

window._rpgViewMember=async function(nick){
  if(!rpgData[nick]) rpgData[nick]=await ensureRpgProfile(nick);
  _activeTab='character';
  renderCharacter(nick);
};
window.goConsole=function(){renderManagerView();};

/* ── Base stat upgrade ── */
window.doUpgradeBase = async function(nick, stat) {
  if(nick !== cu?.nickname){ showToast('You can only upgrade your own stats.', true); return; }
  const credits = calcCredits(nick);
  if(credits < BASE_UPGRADE_COST){ showToast(`Not enough credits. Need ⬡ ${BASE_UPGRADE_COST}.`, true); return; }
  const current = getStatBase(nick, stat);
  const {level} = calcLevel(calcXP(nick));
  const cap = calcBaseForLevel(level);
  if(current >= cap){ showToast(`${stat.toUpperCase()} base is already at the level cap (${cap}).`, true); return; }
  try{
    const ref = doc(db, 'rpg_profile', nick);
    const credRef = doc(db, 'player_credits', nick);
    const newBase = { ...getBaseStats(nick), [stat]: current + 1 };
    await updateDoc(ref, { baseStats: newBase });
    await updateDoc(credRef, { credits: credits - BASE_UPGRADE_COST });
    showToast(`+1 ${stat.toUpperCase()} base stat! ⬡ −${BASE_UPGRADE_COST}`);
  } catch(e){ console.error(e); showToast('Upgrade failed. Try again.', true); }
};

/* ── Game name edit ── */
window.startEditName = function(nick) {
  if(nick !== cu?.nickname) return;
  const displayEl = document.getElementById('gname-display-' + nick);
  if(!displayEl) return;
  const current = displayEl.textContent;
  const parent = displayEl.parentNode;
  displayEl.style.display = 'none';
  const input = document.createElement('input');
  input.className = 'game-name-input';
  input.value = current;
  input.maxLength = 24;
  parent.insertBefore(input, displayEl);
  input.focus(); input.select();
  const save = async () => {
    const val = input.value.trim() || current;
    input.remove();
    displayEl.style.display = '';
    displayEl.textContent = val;
    try {
      const ref = doc(db, 'rpg_profile', nick);
      await updateDoc(ref, { gameName: val });
      showToast('Character name updated!');
    } catch(e) { showToast('Failed to save name.', true); }
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => { if(e.key==='Enter') input.blur(); if(e.key==='Escape'){input.value=current;input.blur();} });
};

/* ── Subscriptions ── */
async function ensureRpgProfile(nick){
  const ref=doc(db,'rpg_profile',nick);
  const snap=await getDoc(ref);
  if(!snap.exists()){
    const init={nick,equippedItems:{weapon:null,armor:null,ring:null,cape:null},inventory:[],debuffs:[],createdAt:new Date().toISOString()};
    await setDoc(ref,init);return init;
  }
  return snap.data();
}

function redraw(nick){
  if(!_currentViewNick) return;
  if(cu?.role==='manager'&&_currentViewNick===cu.nickname) return;
  const viewNick=_currentViewNick;
  const charCard=document.getElementById(`char-card-${viewNick}`);
  if(charCard) charCard.outerHTML=renderCharCard(viewNick);
  const activePanel=document.getElementById('rtab-'+_activeTab);
  if(activePanel){
    if(_activeTab==='character') activePanel.innerHTML=renderCharacterTab(viewNick);
    else if(_activeTab==='inventory') activePanel.innerHTML=renderInventoryTab(viewNick);
    else if(_activeTab==='shop') activePanel.innerHTML=renderShopTab(viewNick);
  }
}

function subscribe(nick){
  unsubs.push(onSnapshot(collection(db,'perfData'),snap=>{snap.forEach(d=>{if(!perfData[d.id])perfData[d.id]={};Object.assign(perfData[d.id],d.data());});redraw(nick);}));
  unsubs.push(onSnapshot(doc(db,'player_credits',nick),snap=>{if(snap.exists())credData[nick]=snap.data();redraw(nick);}));
  unsubs.push(onSnapshot(collection(db,'kc_results'),snap=>{snap.forEach(d=>{kcData[d.id]=d.data();});redraw(nick);}));
  unsubs.push(onSnapshot(collection(db,'callouts'),snap=>{callData=[];snap.forEach(d=>callData.push({...d.data(),_fsId:d.id}));redraw(nick);}));
  unsubs.push(onSnapshot(collection(db,'attendance'),snap=>{attData={};snap.forEach(d=>{attData[d.id]=d.data();});redraw(nick);}));
  unsubs.push(onSnapshot(collection(db,'moodLog'),snap=>{moodData=[];snap.forEach(d=>moodData.push(d.data()));redraw(nick);}));
  unsubs.push(onSnapshot(collection(db,'uno_streaks'),snap=>{snap.forEach(d=>{unoData[d.id]=d.data();});redraw(nick);}));
  unsubs.push(onSnapshot(doc(db,'rpg_profile',nick),snap=>{if(snap.exists())rpgData[nick]=snap.data();redraw(nick);}));
  unsubs.push(onSnapshot(collection(db,'team'),snap=>{snap.forEach(d=>{const data=d.data();if(data.nickname)teamDir[data.nickname]=data;});if(cu?.role==='manager')renderManagerView();}));
}

/* ── Auth ── */
async function loadTeam(nick){const snap=await getDocs(collection(db,'team'));snap.forEach(d=>{const data=d.data();if(data.nickname)teamDir[data.nickname]=data;});return teamDir[nick];}

window.doRpgLogin=async function(){
  const nickEl=document.getElementById('login-nick');
  const errEl=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  const nick=nickEl.value.trim();
  if(!nick){errEl.textContent='Enter your nickname.';return;}
  btn.disabled=true;btn.textContent='Loading...';errEl.textContent='';
  try{
    const member=await loadTeam(nick);
    if(!member){errEl.textContent='Nickname not found.';btn.disabled=false;btn.textContent='Enter Realm';return;}
    cu={nickname:nick,fullName:member.fullName,role:member.role};
    localStorage.setItem('rpg_session',JSON.stringify(cu));
    await enterRealm();
  }catch(e){console.error(e);errEl.textContent='Connection failed. Try again.';btn.disabled=false;btn.textContent='Enter Realm';}
};

window.rpgSignout=function(){
  unsubs.forEach(u=>{try{u();}catch(e){}});
  localStorage.removeItem('rpg_session');
  document.getElementById('pg-main').classList.remove('active');
  document.getElementById('pg-login').classList.remove('hidden');
};

async function enterRealm(){
  document.getElementById('pg-login').classList.add('hidden');
  document.getElementById('loading-overlay').classList.remove('hidden');
  if(!Object.keys(teamDir).length){const snap=await getDocs(collection(db,'team'));snap.forEach(d=>{const data=d.data();if(data.nickname)teamDir[data.nickname]=data;});}
  rpgData[cu.nickname]=await ensureRpgProfile(cu.nickname);
  document.getElementById('loading-overlay').classList.add('hidden');
  document.getElementById('pg-main').classList.add('active');
  _currentViewNick=cu.nickname;
  subscribe(cu.nickname);
  if(cu.role==='manager') renderManagerView();
  else renderCharacter(cu.nickname);
}

/* ── Boot ── */
(async function boot(){
  const stored=localStorage.getItem('rpg_session');
  if(stored){try{const p=JSON.parse(stored);if(p?.nickname&&p?.role){cu=p;await enterRealm();return;}}catch(e){localStorage.removeItem('rpg_session');}}
  const lastNick=localStorage.getItem('rta_last_nick');
  const teamCache=localStorage.getItem('rta_TEAM');
  if(lastNick&&teamCache){try{const team=JSON.parse(teamCache);const member=team.find(m=>m.nickname===lastNick);if(member){cu={nickname:member.nickname,fullName:member.fullName,role:member.role};localStorage.setItem('rpg_session',JSON.stringify(cu));await enterRealm();return;}}catch(e){}}
  document.getElementById('loading-overlay').classList.add('hidden');
  document.getElementById('pg-login').classList.remove('hidden');
})();

document.getElementById('login-nick').addEventListener('keydown',e=>{if(e.key==='Enter')window.doRpgLogin();});
</script>
