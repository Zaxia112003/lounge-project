    var data={active:true,purchasedAt:Date.now(),quarter:quarter,itemId:itemId,name:item.name,icon:item.icon,tier:item.tier,useFlow:item.useFlow||false,requireDate:item.requireDate||false,requireTicket:item.requireTicket||false,goldenIdol:item.goldenIdol||false};
    var update={};update[itemId]=data;
    db.collection('gc_inventory').doc(nick).set(update,{merge:true}).then(function(){
      toast(item.icon+' '+item.name+' purchased!');
      gcRenderShop();
    }).catch(function(e){toast('Purchase error: '+e.message);});
  });
}

/* ── BADGES RENDER ── */
function gcRenderBadges(){
  var pane=G('gc-pane-badges');if(!pane)return;
  var nick=cu?cu.nickname.toLowerCase():'';
  pane.innerHTML='<div style="color:var(--muted);font-size:12px;padding:10px">Loading badges…</div>';
  db.collection('gc_inventory').doc(nick).get().then(function(snap){
    var inv=snap.exists?(snap.data()||{}):{};
    var invEquipped=inv.equipped||{};
    var items=Object.values(inv).filter(function(v){return v&&typeof v==='object'&&v.active&&v.itemId;});
    pane.innerHTML='';
    if(!items.length){
      pane.innerHTML='<div style="text-align:center;padding:40px 20px;"><div style="font-size:32px;margin-bottom:12px">🎖</div><div style="font-size:14px;color:var(--muted)">No active badges or items yet.</div><div style="font-size:12px;color:var(--muted2);margin-top:6px">Visit the Shop tab to buy cosmetics and badges.</div></div>';
      return;
    }
    var sec=document.createElement('div');sec.className='shop-section';sec.textContent='Active items';pane.appendChild(sec);
    items.forEach(function(item){
      var row=document.createElement('div');
      row.id='badge-row-'+item.itemId;
      row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);margin-bottom:8px;';
      var isPending=item.pending;
      var tier=item.tier||'cosmetic';
      var isCosmetic=tier==='cosmetic';
      var isBoost=tier==='boost';
      var isPremiumPlus=tier==='premium'||tier==='legendary';
      /* Expiry only for legendary (quarter-limited) */
      var showExpiry=item.limit==='quarter'||tier==='legendary';
      var left='<div style="display:flex;align-items:center;gap:10px">'
        +'<span style="font-size:22px">'+item.icon+'</span>'
        +'<div>'
        +'<div style="font-size:13px;font-weight:600;color:var(--text)">'+item.name+(isPending?' <span class="badge-pending badge-pill" style="font-size:10px;padding:2px 6px;border-radius:8px;background:rgba(234,179,8,.15);color:var(--amber);">pending approval</span>':'')+'</div>'
        +(showExpiry?'<div style="font-size:10px;color:var(--muted)">Expires end of Q · '+gcQuarterEnd()+'</div>':'<div style="font-size:10px;color:var(--muted)">'+(isCosmetic?'Cosmetic · permanent':(isBoost?'Boost · one-time use':'Premium item'))+'</div>')
        +'</div></div>';
      var right='';
      if(isPending){
        right='<span style="font-size:11px;color:var(--amber)">⏳ pending</span>';
      } else if(isCosmetic){
        /* Equip button — check if already equipped */
        var isEquipped=invEquipped[item.itemId];
        right='<button class="use-badge-btn" '+(isEquipped?'style="border-color:var(--green);color:var(--green);background:rgba(34,197,94,.1);" disabled':'onclick="gcEquipCosmetic(\''+item.itemId+'\')"')+'>'+(isEquipped?'Equipped ✓':'Equip')+'</button>';
      } else if(isBoost){
        /* Activate button — instant, no manager approval */
        right='<button class="use-badge-btn" onclick="gcActivateBoost(\''+item.itemId+'\')">Activate</button>';
      } else if(item.useFlow){
        /* Premium/Legendary — manager approval flow */
        right='<button class="use-badge-btn" onclick="gcOpenUseModal(\''+item.itemId+'\')">Use badge</button>';
      }
      row.innerHTML=left+right;
      pane.appendChild(row);
    });

    /* Pending requests coming back to member */
    db.collection('gc_badge_requests').where('nick','==',nick).where('status','==','pending').get().then(function(reqs){
      reqs.forEach(function(r){
        var d=r.data();
        var row=G('badge-row-'+d.itemId);
        if(row){
          var btn=row.querySelector('.use-badge-btn');
          if(btn){btn.textContent='⏳ pending';btn.disabled=true;}
        }
      });
    }).catch(function(){});
  }).catch(function(){pane.innerHTML='<div style="color:var(--muted);padding:20px;text-align:center;">Could not load badges.</div>';});
}

/* ── EQUIP COSMETIC (no approval needed) ── */
function gcEquipCosmetic(itemId){
  if(!cu||!db)return;
  var nick=cu.nickname.toLowerCase();
  var update={};update['equipped.'+itemId]=true;update['equippedAt.'+itemId]=Date.now();
  db.collection('gc_inventory').doc(nick).set(update,{merge:true}).then(function(){
    toast('✨ '+itemId.replace(/_/g,' ')+' equipped! Visible on your portal profile.');
    gcRenderBadges();
  }).catch(function(e){toast('Error: '+e.message);});
}

/* ── ACTIVATE BOOST (instant, no approval) ── */
function gcActivateBoost(itemId){
  if(!cu||!db)return;
  var nick=cu.nickname.toLowerCase();
  var item=SHOP_ITEMS.find(function(i){return i.id===itemId;})||{name:itemId};
  if(!confirm('Activate '+item.name+'? This will be used immediately.'))return;
  /* Record activation and set expiry based on boost type */
  var expiresAt=Date.now()+(itemId==='boost_2x'?24*60*60*1000:7*24*60*60*1000);
  var upd={};
  upd[itemId+'.activated']=true;
  upd[itemId+'.activatedAt']=Date.now();
  upd[itemId+'.expiresAt']=expiresAt;
  db.collection('gc_inventory').doc(nick).set(upd,{merge:true}).then(function(){
    toast('⚡ '+item.name+' activated!');
    gcRenderBadges();
  }).catch(function(e){toast('Error: '+e.message);});
}

/* ── USE BADGE MODAL ── */
var _gcUseItemId=null;
function gcOpenUseModal(itemId){
  var nick=cu.nickname.toLowerCase();
  db.collection('gc_inventory').doc(nick).get().then(function(snap){
    var inv=snap.exists?(snap.data()||{}):{};
    var item=inv[itemId];
    if(!item)return;
    _gcUseItemId=itemId;
    var modalHtml='<div style="padding:18px;max-width:400px;">'
      +'<div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px">'+item.icon+' Use '+item.name+'</div>'
      +'<div style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.5">This sends a request to your manager for approval.</div>';
    if(item.requireDate){
      modalHtml+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Requested date off *</div>'
        +'<input type="date" id="use-date" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;margin-bottom:12px;">'
        +'<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Notes (optional)</div>'
        +'<textarea id="use-notes" rows="2" placeholder="Any context for your manager…" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;resize:none;margin-bottom:12px;"></textarea>';
    } else if(item.requireTicket||item.goldenIdol){
      var ticketLabel=item.goldenIdol?'Escalation ticket / address':'Error ticket / address';
      modalHtml+='<div style="font-size:11px;color:var(--muted);margin-bottom:4px">'+ticketLabel+' *</div>'
        +'<input type="text" id="use-ticket" placeholder="e.g. ERR-2024-0042" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;margin-bottom:12px;">'
        +'<div style="font-size:11px;color:var(--muted);margin-bottom:4px">Notes (optional)</div>'
        +'<textarea id="use-notes" rows="2" placeholder="Any context…" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;resize:none;margin-bottom:12px;"></textarea>';
    }
    modalHtml+='<div style="display:flex;gap:8px;margin-top:4px;">'
      +'<button onclick="gcSubmitUseRequest(\''+itemId+'\')" style="flex:1;padding:9px;background:rgba(124,58,237,.2);border:1px solid var(--accent);border-radius:8px;color:var(--accent2);font-size:13px;font-weight:600;cursor:pointer;">Send request</button>'
      +'<button onclick="closeModal()" style="padding:9px 16px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;">Cancel</button>'
      +'</div></div>';
    openModal(itemId,'Use badge');
    G('modal-body').innerHTML=modalHtml;
  }).catch(function(){});
}

function gcSubmitUseRequest(itemId){
  var nick=cu.nickname.toLowerCase();
  var extra={};
  var dateEl=G('use-date'),ticketEl=G('use-ticket'),notesEl=G('use-notes');
  if(dateEl)extra.date=dateEl.value;
  if(ticketEl)extra.ticket=ticketEl.value;
  if(notesEl)extra.notes=notesEl.value;
  /* Mark as pending in inventory */
  var upd={};upd[itemId+'.pending']=true;
  db.collection('gc_inventory').doc(nick).update(upd).then(function(){
    /* Create request doc */
    var reqId=nick+'_'+itemId+'_'+Date.now();
    db.collection('gc_badge_requests').doc(reqId).set({
      reqId:reqId,nick:nick,itemId:itemId,
      status:'pending',extra:extra,
      createdAt:Date.now(),mgrRemarks:'',code:''
    }).then(function(){
      /* Notify manager */
      gcPushManagerNotif(nick,itemId,reqId,extra);
      closeModal();
      toast('Request sent to manager ✓');
      gcRenderBadges();
    });
  }).catch(function(e){toast('Error: '+e.message);});
}

function gcPushManagerNotif(memberNick,itemId,reqId,extra){
  /* Find manager nick from TEAM_DIR or fallback */
  var inv=SHOP_ITEMS.find(function(i){return i.id===itemId;})||{name:itemId,icon:'🎖'};
  var mgrNick=null;
  if(window.TEAM){
    var mgr=window.TEAM.find(function(m){return m.role==='manager';});
    if(mgr)mgrNick=mgr.nickname.toLowerCase();
  }
  if(!mgrNick){try{var shifts=JSON.parse(localStorage.getItem('rta_SHIFTS')||'{}');var keys=Object.keys(shifts);/* fallback — can't identify manager */}catch(e){}}
  if(!mgrNick)return;
  var msg=memberNick+' wants to use their '+inv.icon+' '+inv.name+'.'+(extra.date?' Date: '+extra.date:'')+(extra.ticket?' Ref: '+extra.ticket:'');
  gcAddNotification(mgrNick,{type:'badge_request',reqId:reqId,memberNick:memberNick,itemId:itemId,msg:msg,ts:Date.now(),read:false,actionable:true});
}

/* ── NOTIFICATIONS ── */
var _gcNotifs=[];
function gcAddNotification(nick,notif){
  notif.id=nick+'_'+Date.now()+'_'+Math.random().toString(36).substr(2,4);
  db.collection('gc_notifications').doc(nick).get().then(function(snap){
    var notifs=snap.exists?(snap.data().notifs||[]):[];
    notifs.unshift(notif);
    if(notifs.length>50)notifs=notifs.slice(0,50);
    db.collection('gc_notifications').doc(nick).set({notifs:notifs});
  }).catch(function(){});
}

function gcLoadNotifications(){
  if(!cu||!db)return;
  var nick=cu.nickname.toLowerCase();
  db.collection('gc_notifications').doc(nick).onSnapshot(function(snap){
    if(!snap.exists)return;
    _gcNotifs=snap.data().notifs||[];
    gcRenderNotifBell();
    gcRenderNotifPanel();
  });
}

function gcRenderNotifBell(){
  var btn=G('notif-btn');var badge=G('notif-badge');
  if(!btn)return;
  btn.style.display='';
  var unread=_gcNotifs.filter(function(n){return !n.read;}).length;
  if(badge)badge.style.display=unread>0?'block':'none';
}

function toggleNotifPanel(){
  var wrap=G('notif-panel-wrap');
  if(!wrap)return;
  wrap.style.display=wrap.style.display==='none'||!wrap.style.display?'block':'none';
  if(wrap.style.display==='block')gcRenderNotifPanel();
}

function gcRenderNotifPanel(){
  var list=G('notif-list-panel');if(!list)return;
  if(!_gcNotifs.length){list.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0;">No notifications</div>';return;}
  list.innerHTML='';
  var isManager=gcIsManager();
  _gcNotifs.forEach(function(n){
    var div=document.createElement('div');
    div.style.cssText='padding:12px;background:'+(n.read?'transparent':'rgba(124,58,237,.06)')+';border:1px solid '+(n.read?'var(--border)':'rgba(124,58,237,.2)')+';border-radius:10px;margin-bottom:8px;';
    var actionHtml='';
    if(isManager&&n.actionable&&n.type==='badge_request'&&!n.resolved){
      actionHtml='<div style="display:flex;gap:6px;margin-top:8px;">'
        +'<button onclick="gcMgrApprove(\''+n.reqId+'\',\''+n.id+'\')" style="font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid var(--green);background:rgba(34,197,94,.12);color:var(--green);cursor:pointer;">Approve</button>'
        +'<button onclick="gcMgrDiscard(\''+n.reqId+'\',\''+n.id+'\')" style="font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid var(--red);background:rgba(239,68,68,.1);color:var(--red);cursor:pointer;">Discard</button>'
        +'</div>';
    }
    div.innerHTML='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">'
      +'<div style="font-size:12px;color:var(--text);line-height:1.5;flex:1;">'+n.msg+'</div>'
      +'<button onclick="gcMarkRead(\''+n.id+'\')" style="font-size:16px;background:none;border:none;cursor:pointer;color:var(--muted);flex-shrink:0;padding:0;" title="Dismiss">✕</button>'
      +'</div>'
      +'<div style="font-size:10px;color:var(--muted2);margin-top:4px;">'+new Date(n.ts).toLocaleString('en-AU',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'})+'</div>'
      +actionHtml;
    list.appendChild(div);
  });
}

function gcMarkRead(notifId){
  var nick=cu.nickname.toLowerCase();
  _gcNotifs=_gcNotifs.filter(function(n){return n.id!==notifId;});
  db.collection('gc_notifications').doc(nick).set({notifs:_gcNotifs});
  gcRenderNotifBell();
  gcRenderNotifPanel();
}

/* ── MANAGER APPROVAL FLOW ── */
function gcMgrApprove(reqId,notifId){
  db.collection('gc_badge_requests').doc(reqId).get().then(function(snap){
    if(!snap.exists)return;
    var req=snap.data();
    var item=SHOP_ITEMS.find(function(i){return i.id===req.itemId;})||{name:req.itemId,icon:'🎖',requireDate:false,requireTicket:false};
    /* Build approval modal */
    var isFood=req.itemId==='snack_bar'||req.itemId==='lunch_stub';
    var fieldHtml=isFood
      ?'<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Redemption code *</div><input type="text" id="mgr-code" placeholder="e.g. SNACK-2024-JB" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;margin-bottom:12px;">'
      :'<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">Remarks *</div><textarea id="mgr-remarks" rows="3" placeholder="e.g. Approved for 15 May. Enjoy your day!" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;resize:none;margin-bottom:12px;"></textarea>';
    var modalHtml='<div style="padding:18px;">'
      +'<div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;">'+item.icon+' Approve '+item.name+'</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-bottom:14px;">From: '+req.nick+(req.extra&&req.extra.date?' · Date: '+req.extra.date:'')+(req.extra&&req.extra.ticket?' · Ref: '+req.extra.ticket:'')+'</div>'
      +fieldHtml
      +'<div style="display:flex;gap:8px;">'
      +'<button onclick="gcMgrSendApproval(\''+reqId+'\',\''+notifId+'\','+isFood+')" style="flex:1;padding:9px;background:rgba(34,197,94,.15);border:1px solid var(--green);border-radius:8px;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;">Approve &amp; send</button>'
      +'<button onclick="closeModal()" style="padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;">Cancel</button>'
      +'</div></div>';
    openModal('mgr-approve','Approve request');
    G('modal-body').innerHTML=modalHtml;
  });
}

function gcMgrSendApproval(reqId,notifId,isFood){
  var codeEl=G('mgr-code'),remarksEl=G('mgr-remarks');
  var value=codeEl?codeEl.value:remarksEl?remarksEl.value:'';
  if(!value.trim()){toast('Please fill in the field');return;}
  db.collection('gc_badge_requests').doc(reqId).get().then(function(snap){
    if(!snap.exists)return;
    var req=snap.data();
    /* Update request */
    db.collection('gc_badge_requests').doc(reqId).update({status:'approved',mgrRemarks:value,resolvedAt:Date.now()});
    /* Remove badge from member inventory */
    var upd={};upd[req.itemId]=firebase.firestore.FieldValue.delete();
    db.collection('gc_inventory').doc(req.nick).update(upd);
    /* Notify member */
    var msg=isFood?'Your '+req.itemId.replace('_',' ')+' has been approved! Redemption code: '+value+'. Show this when collecting.':'Your badge use request has been approved. Manager remarks: '+value;
    gcAddNotification(req.nick,{type:'badge_approved',msg:msg,ts:Date.now(),read:false,actionable:false});
    /* Mark notif as resolved */
    gcMarkNotifResolved(notifId);
    closeModal();
    toast('Approved and member notified ✓');
  });
}

function gcMgrDiscard(reqId,notifId){
  db.collection('gc_badge_requests').doc(reqId).get().then(function(snap){
    if(!snap.exists)return;
    var req=snap.data();
    db.collection('gc_badge_requests').doc(reqId).update({status:'discarded',resolvedAt:Date.now()});
    /* Remove badge from member inventory */
    var upd={};upd[req.itemId]=firebase.firestore.FieldValue.delete();
    db.collection('gc_inventory').doc(req.nick).update(upd);
    /* Notify member */
    gcAddNotification(req.nick,{type:'badge_discarded',msg:'Your '+req.itemId.replace(/_/g,' ')+' use request was reviewed and not approved this time. The badge has been removed.',ts:Date.now(),read:false,actionable:false});
    gcMarkNotifResolved(notifId);
    toast('Request discarded');
    gcRenderNotifPanel();
  });
}

function gcMarkNotifResolved(notifId){
  var nick=cu.nickname.toLowerCase();
  _gcNotifs=_gcNotifs.map(function(n){return n.id===notifId?Object.assign({},n,{resolved:true,read:true}):n;});
  _gcNotifs=_gcNotifs.filter(function(n){return !n.resolved;});
  db.collection('gc_notifications').doc(nick).set({notifs:_gcNotifs});
  gcRenderNotifBell();
  gcRenderNotifPanel();
}


function mgrSetCredit(nick){
  var el=G('credit-input-'+nick);
  if(!el)return;
  var val=parseInt(el.value)||0;
  if(val<0){toast('Cannot set negative credits');return;}
  db.collection('player_credits').doc(nick).set({credits:val},{merge:true}).then(function(){
    _allCredits[nick]=val;
    var lbl=G('credit-lbl-'+nick);
    if(lbl)lbl.textContent=val+' credit'+(val!==1?'s':'');
    toast('Credits for '+nick+' set to '+val);
  }).catch(function(){toast('Error updating credits.');});
}

/* ── BOOT: load notifs on init ── */
var _origInit=window.init;
window.init=function(){
  if(_origInit)_origInit.apply(this,arguments);
  setTimeout(function(){if(cu&&db){gcLoadNotifications();}},1200);
};
</script>
