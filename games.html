<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎮 Game Corner — The Lounge</title>
<style>
:root{
  --bg:#12141f;--surface:#1a1d2e;--surface2:#222537;--border:#2a2d4a;--border2:#3a3d5a;
  --text:#e8eaf6;--muted:#8892b0;--muted2:#6272a4;--accent:#7c3aed;--accent2:#9461f7;
  --green:#22c55e;--red:#ef4444;--amber:#eab308;
  --font:'Inter',system-ui,sans-serif;--fd:'Space Grotesk',var(--font);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
.header{background:rgba(18,20,31,.95);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.header-logo{font-family:var(--fd);font-size:17px;font-weight:800;background:linear-gradient(135deg,#7c3aed,#9461f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.credit-pill{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;color:var(--accent2);}
.user-chip{display:flex;align-items:center;gap:8px;margin-left:auto;}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#9461f7);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.user-nick{font-size:12px;font-weight:600;}
/* Sound */
.snd-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;position:relative;}
.snd-panel{position:absolute;top:52px;right:16px;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:16px;width:200px;display:none;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.snd-panel.open{display:block;}
.snd-panel label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px;}
.snd-panel input[type=range]{width:100%;}
.eq{display:flex;gap:2px;height:20px;align-items:flex-end;}
.eq-b{width:3px;border-radius:2px 2px 0 0;background:var(--accent2);animation:eq .8s infinite alternate ease-in-out;}
.eq-b.off{animation:none;background:var(--muted2);height:4px;}
.eq-b:nth-child(1){height:8px;animation-delay:0s;}
.eq-b:nth-child(2){height:14px;animation-delay:.1s;}
.eq-b:nth-child(3){height:10px;animation-delay:.2s;}
.eq-b:nth-child(4){height:18px;animation-delay:.3s;}
.eq-b:nth-child(5){height:7px;animation-delay:.4s;}
@keyframes eq{from{height:4px;}to{height:18px;}}
/* main */
.main{max-width:900px;margin:0 auto;padding:24px 16px;}
.section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted2);text-transform:uppercase;margin-bottom:12px;}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:28px;}
.gc-tab{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;}
.gc-tab:hover{border-color:var(--accent);color:var(--text);}
.gc-tab-on{background:rgba(124,58,237,.2);border-color:var(--accent);color:var(--accent2);font-weight:600;}
.shop-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;transition:border-color .15s;}
.shop-card:hover{border-color:var(--accent);}
.shop-section{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--muted2);text-transform:uppercase;margin:18px 0 10px;}
.badge-pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:4px;}
.badge-amber{background:rgba(234,179,8,.15);color:#eab308;border:1px solid rgba(234,179,8,.3);}
.badge-teal{background:rgba(20,184,166,.15);color:#14b8a6;border:1px solid rgba(20,184,166,.3);}
.badge-purple{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3);}
.badge-red{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3);}
.badge-green{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3);}
.badge-blue{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3);}
.badge-pending{background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.2);opacity:.7;}
.use-badge-btn{font-size:11px;padding:4px 10px;border-radius:8px;border:1px solid var(--accent);background:rgba(124,58,237,.1);color:var(--accent2);cursor:pointer;transition:all .12s;}
.use-badge-btn:hover{background:rgba(124,58,237,.2);}
.use-badge-btn:disabled{opacity:.4;cursor:default;border-color:var(--border);background:transparent;color:var(--muted);}
.tier-legendary{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;}
.tier-premium{background:rgba(234,179,8,.12);color:#fbbf24;border:1px solid rgba(234,179,8,.25);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;}
.tier-boost{background:rgba(20,184,166,.12);color:#2dd4bf;border:1px solid rgba(20,184,166,.25);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;}
.tier-cosmetic{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.25);font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:border-color .15s,transform .15s;position:relative;overflow:hidden;}
.tile::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,58,237,.05),transparent);opacity:0;transition:opacity .15s;}
.tile:hover{border-color:var(--accent);transform:translateY(-2px);}
.tile:hover::before{opacity:1;}
.tile.multi{border-color:rgba(34,197,94,.2);}
.tile.multi:hover{border-color:var(--green);}
.tile-icon{font-size:28px;margin-bottom:8px;}
.tile-name{font-size:13px;font-weight:700;font-family:var(--fd);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;}
.solo-b{background:rgba(124,58,237,.15);color:var(--accent2);}
.multi-b{background:rgba(34,197,94,.12);color:var(--green);}
.tile-desc{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}
/* no-login */
#nologin{text-align:center;padding:60px 20px;}
#nologin .nl-icon{font-size:48px;margin-bottom:16px;}
#nologin h2{font-family:var(--fd);font-size:20px;margin-bottom:8px;}
#nologin p{font-size:13px;color:var(--muted);line-height:1.6;}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;width:min(98vw,1100px);height:min(96vh,900px);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.6);}
.modal.modal-sm{width:min(96vw,520px);height:auto;max-height:80vh;}
.modal-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.modal-title{font-family:var(--fd);font-size:15px;font-weight:700;}
.score-chip{font-size:11px;color:var(--muted);padding:2px 8px;background:var(--surface2);border-radius:10px;}
.modal-close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;}
.modal-body{padding:0;overflow-y:auto;flex:1;display:flex;flex-direction:column;align-items:stretch;}
.modal.modal-sm .modal-body{padding:20px 28px;align-items:center;}
/* buttons */
.btn{font-family:var(--font);font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;padding:7px 14px;transition:opacity .15s,background .15s;}
.btn-primary{background:var(--accent);color:#fff;border:none;}
.btn-primary:hover{opacity:.85;}
.btn-outline{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-outline:hover{border-color:var(--accent2);color:var(--text);}
/* toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e2035;border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:nowrap;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo" id="header-logo">🎮 Game Corner</div>
  <div class="credit-pill" id="credit-pill">🎮 — credits</div>
  <div style="display:flex;align-items:center;gap:8px;margin-left:auto;position:relative">
    <!-- Notification bell -->
    <button id="notif-btn" style="display:none;position:relative;background:none;border:none;cursor:pointer;font-size:18px;padding:4px;line-height:1;" onclick="toggleNotifPanel()" aria-label="Notifications">🔔<span id="notif-badge" style="display:none;position:absolute;top:0;right:0;width:8px;height:8px;border-radius:50%;background:var(--red);"></span></button>
    <!-- Manager settings button (replaces logo area, visible to manager only) -->
    <button id="mgr-credits-btn" style="display:none;width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:16px;align-items:center;justify-content:center;" onclick="toggleMgrPanel()" title="Manager Settings" aria-label="Manager Settings">⚙️</button>
    <div class="user-chip" id="user-chip" style="display:none">
      <div class="av" id="user-av"></div>
      <div class="user-nick" id="user-nick"></div>
    </div>
  </div>
</div>

<!-- Manager credit management panel -->
<div id="mgr-panel-wrap" style="display:none;position:fixed;top:58px;right:0;width:360px;height:calc(100vh - 58px);background:var(--surface);border-left:1px solid var(--border);z-index:200;overflow-y:auto;padding:16px;box-shadow:-4px 0 20px rgba(0,0,0,.3);">
  <div id="mgr-pane"></div>
</div>

<!-- Notification panel -->
<div id="notif-panel-wrap" style="display:none;position:fixed;top:58px;right:0;width:320px;height:calc(100vh - 58px);background:var(--surface);border-left:1px solid var(--border);z-index:201;overflow-y:auto;padding:16px;box-shadow:-4px 0 20px rgba(0,0,0,.3);">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div style="font-size:14px;font-weight:700;color:var(--text)">🔔 Notifications</div>
    <button onclick="toggleNotifPanel()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer">✕</button>
  </div>
  <div id="notif-list-panel"><div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0;">No notifications</div></div>
</div>

<div class="main">
  <div id="nologin" style="display:none">
    <div class="nl-icon">🎮</div>
    <h2>Sign in to play</h2>
    <p>Open <strong>The Lounge Portal</strong> and sign in with your PIN first.<br>Your session will carry over here automatically.</p>
  </div>
  <div id="game-grid">
    <!-- Tab nav -->
    <div style="display:flex;gap:8px;margin-bottom:18px;" id="gc-tabs">
      <button class="gc-tab gc-tab-on" id="tab-games" onclick="gcSwitchTab('games')">🎮 Games</button>
      <button class="gc-tab" id="tab-shop" onclick="gcSwitchTab('shop')">🛒 Shop</button>
      <button class="gc-tab" id="tab-badges" onclick="gcSwitchTab('badges')">🎖 My Badges</button>
    </div>
    <!-- Games tab -->
    <div id="gc-pane-games">
      <div class="section-label">Solo Games</div>
      <div class="game-grid" id="solo-grid"></div>
      <div class="section-label">Multiplayer</div>
      <div class="game-grid" id="multi-grid"></div>
    </div>
    <!-- Shop tab -->
    <div id="gc-pane-shop" style="display:none"></div>
    <!-- Badges tab -->
    <div id="gc-pane-badges" style="display:none"></div>
  </div>
</div>

<div class="modal-overlay" id="game-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title"></div>
      <div class="score-chip" id="cur-score"></div>
      <div class="score-chip" id="best-score"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var db=null;
firebase.initializeApp({"apiKey": "AIzaSyByZVGBzLgXw59s1qCM8NOyuUYMDCZi84o", "projectId": "rta-portal-ee180", "appId": "1:873530548996:web:bcb927ca8a4a8501936651"});
db=firebase.firestore();
</script>
<script>
var KB_QUESTIONS=[
  {id:1,cat:"Address",q:"The submission shows the address as 10 Smith Street but the contract reads 10 Smith St. What do you do?",opts:["Do not upload. Flag to escalation.","Proceed as normal — it is the same address.","Contact the agent before doing anything.","Upload and leave a note for tagging."],ans:1,exp:"Different street designator formats (Street vs St) represent the same address. Proceed normally."},
  {id:2,cat:"Address",q:"The submission shows unit 5/10 Smith Street but the contract shows Unit 5, 10 Smith Street. What do you do?",opts:["Do not upload — the address is different.","Proceed — different format, same address.","Flag to escalation.","Ask the agent to resubmit."],ans:1,exp:"Different format, same address. Proceed."},
  {id:3,cat:"Address",q:"The submission shows 12A Smith Street but the contract shows 12 Smith Street. What do you do?",opts:["Proceed — minor difference.","Do not upload. Flag to escalation.","Upload with a note for tagging.","Contact the agent to confirm."],ans:1,exp:"The unit/lot detail differs. Flag to escalation."},
  {id:4,cat:"Address",q:"A submission comes in for Lot 5, 10 Smith Street but the contract says 5/10 Smith Street. What do you do?",opts:["Do not upload — lot numbers are not unit numbers.","Flag to escalation immediately.","Proceed — these are different formats of the same address.","Check with your manager first."],ans:2,exp:"Lot 5 and 5/10 are the same address in different formats. Proceed."},
  {id:5,cat:"Address",q:"The contract address shows 10-12 Smith Street (dashed block) but the submission only shows 10 Smith Street. What is the correct handling?",opts:["Proceed — dashes are common in addresses.","Flag to escalation.","Do not upload and send a new request.","Proceed — lot 10 falls within the range 10-12."],ans:3,exp:"Lot 10 falls within the stated range 10-12. Proceed as the address is covered by the block range."},
  {id:6,cat:"Address",q:"The submission shows Lot __, 7 Smith Street (no lot number filled in). What do you do?",opts:["Proceed — lot number is optional.","Flag to escalation.","Upload with a note about the blank lot number.","Do not upload. Flag to escalation."],ans:3,exp:"A blank lot number in the submission cannot be processed. Flag to escalation."},
  {id:7,cat:"Address",q:"A submission comes in for 12 Smith Road but the contract says 12 Smith Avenue. What do you do?",opts:["Proceed — if it shows the same location.","Do not upload. Flag to escalation.","Upload with a note for tagging.","Contact the agent to confirm."],ans:0,exp:"Proceed if it shows the same location. We escalate only if the addresses show a different location from each other."},
  {id:10,cat:"Address",q:"The submission shows Unit 2, 10 Smith Street but the contract shows 2/10 Smith Street. What do you do?",opts:["Flag to escalation — the addresses don't match.","Proceed — same address, different format.","Upload and note the discrepancy.","Ask the agent to resubmit with the correct format."],ans:1,exp:"Unit 2 and 2/10 are the same address in different formats. Proceed."},
  {id:11,cat:"Address",q:"The submission shows 10 Smith Street but the contract shows 10 Smythe Street. What do you do?",opts:["Proceed — minor spelling variation.","Flag to escalation.","Upload with a note.","Contact the agent for clarification."],ans:1,exp:"Different street names are different addresses. Flag to escalation."},
  {id:12,cat:"Address",q:"A contract has an accessory unit (e.g. granny flat) listed in the address. The submission doesn\'t include it. What do you do?",opts:["Proceed — the submission is not required to include the accessory unit.","Flag to escalation.","Upload with a note for tagging.","Contact the agent before uploading."],ans:0,exp:"Submissions are not required to include accessory units. Proceed with or without it."},
  {id:13,cat:"Address",q:"The submission shows Suite 5, Level 2, 10 Smith Street but the contract shows Level 2, 10 Smith Street with no suite number. What do you do?",opts:["Proceed — similar enough address.","Flag to escalation.","Upload with a note.","Do not upload."],ans:1,exp:"Missing suite number on the contract is an address discrepancy. Flag to escalation."},
  {id:14,cat:"Address",q:"You receive a submission for 10 Smith Street, Suburb VIC 3000 but the contract is for 10 Smith Street, Suburban VIC 3001. What do you do?",opts:["Proceed — same street, close postcodes but still okay.","Flag to escalation.","Upload with a note.","Contact the agent."],ans:1,exp:"Different suburb/postcode means a different address. Flag to escalation."},
  {id:15,cat:"Address",q:"The submission says Drive but the contract says Close. What do you do?",opts:["Proceed — if it shows the same location.","Flag to escalation.","Upload with a note for tagging.","Ask the agent before proceeding."],ans:0,exp:"Proceed if both show the same location. We escalate only if the addresses point to different locations."},
  {id:16,cat:"Vendor Name",q:"The submission shows Robbie Test but the contract shows Robbi Test. What do you do?",opts:["Do not upload. Flag to escalation.","Proceed and leave a note for tagging.","Ask the agent to correct the name.","Flag to escalation."],ans:1,exp:"Minor spelling variation (Robbie vs Robbi). Proceed with a note for tagging."},
  {id:17,cat:"Vendor Name",q:"The submission shows Robbie Test but the contract shows Robert Test. What do you do?",opts:["Proceed — Robert and Robbie are the same person.","Upload with a note for tagging.","Flag to escalation.","Proceed — minor difference."],ans:2,exp:"Entirely different names. Flag to escalation."},
  {id:18,cat:"Vendor Name",q:"The submission shows Rob Test but the contract shows Robbie Test. What do you do?",opts:["Proceed and leave a note.","Upload and flag to escalation.","Do not upload. Flag to escalation.","Proceed — Rob is a common nickname for Robbie."],ans:1,exp:"Nicknames: upload first, then flag to escalation."},
  {id:19,cat:"Vendor Name",q:"The submission shows Robbie Test but the contract shows Robbie Jonathon Test (with a middle name). What do you do?",opts:["Do not upload — the names don't match.","Proceed without the middle name and leave a note for tagging.","Flag to escalation — middle name mismatch.","Upload and flag to escalation."],ans:1,exp:"It is okay to proceed without a middle name. Leave a note for tagging."},
  {id:20,cat:"Vendor Name",q:"The submission shows Robbie Joseph Test but the contract shows Robbie Jonathon Test. What do you do?",opts:["Proceed — middle names often vary.","Leave a note and proceed.","Flag to escalation — middle names are different.","Upload and ask the agent."],ans:2,exp:"Different middle names require escalation."},
  {id:21,cat:"Vendor Name",q:"The submission shows Robbie Test but the contract shows Robbie Test-Contract (hyphenated last name). What do you do?",opts:["Proceed if the contract last name is present in the submission.","Do not upload. Flag to escalation.","Proceed if the submission last name is present in the hyphenated contract name.","Upload and contact the agent."],ans:2,exp:"Proceed if the submission last name (Test) is present within the hyphenated contract name (Test-Contract). Leave a note."},
  {id:22,cat:"Vendor Name",q:"The submission shows Robbie Test but the contract shows Robbie Contract (Formerly known as Robbie Test). What do you do?",opts:["Do not upload — names are different.","Apply the same handling as hyphenated last names.","Flag to escalation.","Proceed — clearly same person."],ans:1,exp:"AKA/Formerly Known: proceed if the submission name is present in the AKA name. Same logic as hyphenated last names. Leave a note."},
  {id:23,cat:"Vendor Name",q:"The submission shows Robbie Test but the contract shows Robbie Contract with no reference to \'formerly known as.\' The email on the contract is robbietest@agency.com. What do you do?",opts:["Flag to escalation — names are completely different.","Proceed — the email contains an indication of the former last name. Leave a note.","Confirm with team lead.","Upload and ask the agent to clarify."],ans:1,exp:"If the email contains an indication of the former last name, proceed with a note."},
  {id:24,cat:"Vendor Name",q:"The submission shows Robbie Test but the contract shows Robbie Contract with no email hint and no other indicators. What do you do?",opts:["Proceed — likely same person.","Flag to escalation — none of the proceed conditions are met.","Upload with a note for tagging.","Ask the agent before uploading."],ans:1,exp:"None of the proceed conditions are met. Flag to escalation."},
  {id:"24b",cat:"Vendor Name",q:"Any of these are conditions we can base on to proceed with a vendor who has a different last name EXCEPT one. Which is the exception?",opts:["There is a note on the submission informing us about a last name change.","There is an indication on the contract that the last name is 'formerly known as'.","Both last names were mentioned in key pages of the contract (e.g. S32, COS, Particulars of Sale).","The vendor email address contains an indication of the former last name."],ans:2,exp:"We cannot base on whether both last names appear somewhere in the contract. We still base accuracy on the match between submission and contract."},
  {id:25,cat:"Vendor Name",q:"A vendor solicitor is signing the Section 32 on behalf of the vendor. What is the correct handling?",opts:["Do not upload — solicitors cannot sign.","Flag to escalation.","Okay to proceed. Leave a note for tagging.","Upload and contact the agent."],ans:2,exp:"Vendor solicitor signing S32: okay to proceed. Leave a note for tagging."},
  {id:26,cat:"Vendor Name",q:"The submission shows two vendors but the contract only shows one. What do you do?",opts:["Proceed — note with 2 vendors as per the submission.","Flag to escalation.","Reach out to agent.","Do not upload and request a new submission."],ans:0,exp:"We can proceed if the submission has more vendors than the contract (2 to 1). Note to proceed with 2 vendors. We flag only if the contract has more vendors than the submission (1 to 2)."},
  {id:27,cat:"Vendor Name",q:"The submission shows Robbie Test and Sam Test but the contract only shows Sam Test. What do you do?",opts:["Proceed — Sam Test is on both.","Do not upload — missing vendor.","Flag to escalation.","Upload and note that we can proceed with 2 vendors."],ans:3,exp:"Submission has more vendors than contract. Upload and note that we proceed with 2 vendors."},
  {id:28,cat:"Vendor Name",q:"The submission has a vendor named A & B Pty Ltd but the contract shows A and B Pty Ltd. What do you do?",opts:["Flag to escalation — company names don't match.","Edit the vendor name on dashboard following the contract format.","Upload with a note for tagging.","Contact the agent to confirm."],ans:2,exp:"Minor formatting difference in company name. Proceed with a note for tagging."},
  {id:29,cat:"Vendor Name",q:"The contract has a vendor name spelled completely differently from the submission with no similarity at all. What do you do?",opts:["Proceed — agent likely knows the vendor.","Upload with a note.","Flag to escalation.","Contact the agent before uploading."],ans:2,exp:"Entirely different names. Flag to escalation."},
  {id:30,cat:"Vendor Name",q:"You see a submission where the vendor\'s email address is different from what appears on the contract. The names match perfectly. What do you do?",opts:["Proceed — email addresses can be amended.","Flag to escalation — email mismatch is a vendor detail issue.","Upload with a note for tagging.","Contact the agent directly."],ans:0,exp:"Email addresses can be amended and do not necessarily require escalation."},
  {id:31,cat:"File",q:"A submission comes in but the attached PDF is missing the Contract of Sale pages. What do you do?",opts:["Upload anyway — the Section 32 is complete.","DO NOT UPLOAD. Flag to escalation.","Upload and ask the agent to send the missing pages.","Upload then flag to escalation with internal notes."],ans:1,exp:"Missing key pages: DO NOT UPLOAD. Flag to escalation."},
  {id:32,cat:"File",q:"A submission comes in with the wrong file attached (it\'s a different property\'s contract). What do you do?",opts:["Upload and note it's the wrong file.","Contact the agent to send the correct file.","DO NOT UPLOAD. Flag to escalation.","Upload — the listing will still be created correctly."],ans:2,exp:"Wrong file: DO NOT UPLOAD. Flag to escalation."},
  {id:33,cat:"File",q:"An agent submits two separate PDF files — one for the Contract of Sale and one for the Section 32. What do you do?",opts:["Merge them and upload.","Upload both separately.","DO NOT UPLOAD. Flag to escalation.","Upload the Contract of Sale only."],ans:2,exp:"Separate files: DO NOT UPLOAD. Flag to escalation. The team cannot legally merge documents."},
  {id:34,cat:"File",q:"The contract PDF is submitted but the vendor signing fields are blank (no vendor/purchaser details filled in). What do you do?",opts:["Proceed as usual — fields will be tagged anyway.","DO NOT UPLOAD. Flag to escalation.","Tag the contract first then upload.","Contact the agent to fill in the fields."],ans:0,exp:"Blank vendor fields are okay. The fields will be filled in during tagging. Proceed as usual."},
  {id:35,cat:"File",q:"The submission has the vendor names hardcoded into the purchaser signing field instead of the vendor field. What do you do?",opts:["DO NOT UPLOAD. Flag to escalation.","Upload as-is — the system will sort it.","Can be uploaded. Flag to escalation.","Contact the agent to resubmit."],ans:2,exp:"Vendor details hardcoded to purchaser field: CAN be uploaded. Flag to escalation."},
  {id:36,cat:"File",q:"The Section 32 is extremely long with many extra pages making it oversized. What do you do?",opts:["DO NOT UPLOAD. Request a trimmed version.","Can be uploaded. Flag to escalation.","DO NOT UPLOAD. Flag to escalation.","Upload — file size isn't your concern."],ans:1,exp:"Oversized S32: CAN be uploaded. Flag to escalation."},
  {id:37,cat:"File",q:"A submitted PDF file is 156MB. What do you do?",opts:["Proceed and upload normally — it is within the limit.","Upload is not possible. Flag to escalation.","DO NOT UPLOAD. Contact the agent.","Compress the file and then upload."],ans:0,exp:"The maximum file size is 157MB. 156MB is within the limit. Upload normally."},
  {id:39,cat:"File",q:"The submission is missing Form 2 but contains the Contract of Sale and Section 32. What do you do?",opts:["Proceed — the contract can still be uploaded without Form 2.","Upload — Form 2 can be added later.","DO NOT UPLOAD. Flag to escalation.","Upload and note the missing Form 2."],ans:0,exp:"Form 2 is for QLD. If the contract has a Section 32, it is a VIC contract. Proceed as usual."},
  {id:42,cat:"File",q:"A file is submitted at 156MB. What do you do?",opts:["Upload is not possible — it exceeds the limit.","Proceed and upload normally.","Flag to escalation before uploading.","Compress the file first."],ans:1,exp:"156MB is under the 157MB limit. Proceed normally."},
  {id:43,cat:"File",q:"Which of the following file issues CAN be uploaded before flagging to escalation?",opts:["Missing key pages","Wrong file attached","Vendor details hardcoded to purchaser field","None of the above"],ans:2,exp:"Vendor hardcoded to purchaser field can be uploaded first, then flagged. All others cannot be uploaded."},
  {id:44,cat:"File",q:"Which of the following file issues CANNOT be uploaded at all?",opts:["Missing S32","File over 156MB","Oversized S32","Both A and B"],ans:0,exp:"Missing S32 (missing key pages) = DO NOT UPLOAD. Oversized S32 can still be uploaded then flagged."},
  {id:45,cat:"File",q:"A PDF opens fine but only contains blank pages after the first page. What do you do?",opts:["Upload — the first page is readable.","DO NOT UPLOAD. Flag to escalation.","Upload and note the blank pages.","Request a new file before flagging."],ans:1,exp:"Effectively missing key pages. DO NOT UPLOAD. Flag to escalation."},
  {id:46,cat:"Nature Matrix",q:"The submission shows Self and the contract confirms Self. The vendor details match. What do you do?",opts:["Proceed.","Flag to escalation — always verify nature.","Proceed if vendor details are correct.","Upload with a note."],ans:2,exp:"Self/Self with matching details: proceed."},
  {id:47,cat:"Nature Matrix",q:"The submission shows Self but the contract shows Executor. What do you do?",opts:["Do not proceed. Flag to escalation.","Follow the details as per the contract. Pass to escalation (Estate Signer Missing).","Proceed — Self and Executor are interchangeable.","Contact the agent."],ans:1,exp:"Self/Executor: follow contract details, pass to escalation with the Estate Signer Missing flag."},
  {id:49,cat:"Nature Matrix",q:"The submission shows Self but the contract shows POA (Company). What do you do?",opts:["Follow the contract and note it.","Do not proceed — flag to escalation.","Proceed — company is an extension of self.","Upload and ask the agent."],ans:1,exp:"Self/POA(Company): do not proceed. Flag to escalation (Vendors Do Not Match Contract)."},
  {id:50,cat:"Nature Matrix",q:"The submission shows Self but the contract shows Director of Company. What do you do?",opts:["Proceed if the company name is on the submission.","Do not proceed. Flag to escalation.","Upload with a note for tagging.","Proceed — common situation."],ans:1,exp:"Self/Director: do not proceed. Flag to escalation."},
  {id:51,cat:"Nature Matrix",q:"The submission shows Self but the contract shows Trustee. What do you do?",opts:["Do not proceed. Flag to escalation.","Proceed if the trust name matches.","Upload with a note.","Contact the agent for clarity."],ans:0,exp:"Self/Trustee: do not proceed. Flag to escalation."},
  {id:52,cat:"Nature Matrix",q:"The submission shows POA (Individual) but the contract shows Self. The representative is on the contract but the represented individual is NOT. What do you do?",opts:["Proceed — POA and Self are interchangeable.","Flag to escalation.","Upload — it's the POA's name that matters.","Do not upload and wait for the agent."],ans:1,exp:"When the represented individual is NOT on the contract, flag to escalation."},
  {id:55,cat:"Nature Matrix",q:"The submission shows Executor and the contract shows Legal Representative. What do you do?",opts:["Flag to escalation.","Do not upload.","These are interchangeable — proceed.","Upload with a note."],ans:2,exp:"Executor/Legal Representative: interchangeable. Proceed."},
  {id:56,cat:"Nature Matrix",q:"The submission shows Executor and the contract shows Administrator. What do you do?",opts:["Flag to escalation.","These are interchangeable — proceed.","Do not upload.","Ask the agent which is correct."],ans:1,exp:"Executor/Administrator: interchangeable. Proceed."},
  {id:57,cat:"Nature Matrix",q:"The submission shows Director of Company and the contract shows Director of Company but the company name is incorrect. What do you do?",opts:["Proceed — the nature matches.","Flag to escalation.","Upload with a note.","Contact the agent to confirm the company."],ans:1,exp:"Incorrect company name is a flag condition for Director/Director."},
  {id:58,cat:"Nature Matrix",q:"The submission shows POA (Individual) but the contract shows Executor. What is the correct handling?",opts:["Do not proceed. Flag to escalation.","Proceed if represented individual is on the contract.","These are interchangeable — proceed.","Upload and contact the agent."],ans:2,exp:"POA(Individual)/Executor: interchangeable. Proceed if represented individual is on the contract."},
  {id:59,cat:"Nature Matrix",q:"The submission shows Self but the vendor details on the contract are completely different (wrong name, wrong email). What do you do?",opts:["Proceed — Self/Self nature matches.","Flag to escalation — vendor details are different.","Upload with a note.","Contact the agent."],ans:1,exp:"Self/Self but details are different: flag to escalation."},
  {id:60,cat:"Nature Matrix",q:"A submission has two vendors — one is Self and one is Director of Company. The contract matches the same combination. What do you do?",opts:["Flag to escalation — mixed natures require review.","Proceed if all details match for each nature type.","Do not upload.","Upload only after escalation approves."],ans:1,exp:"Each vendor is assessed individually against the matrix. If all match, proceed."},
  {id:61,cat:"Listing",q:"An agent sends a new upload but marks it as an updated submission and no existing ticket can be found. What do you do?",opts:["Treat it as an update — follow the agent's label.","Check the AU queue — the parent ticket might be there.","Do not upload — agent must resubmit correctly.","Flag to escalation immediately."],ans:1,exp:"If no ticket is found, check the AU queue. Flag to escalation if the listing is non-existent."},
  {id:64,cat:"Listing",q:"The submission is for a property whose auction date has already passed. What do you do?",opts:["Do not upload — the auction has passed.","Upload then flag to escalation.","Proceed normally — the contract is still valid.","Upload and notify the agent."],ans:1,exp:"Passed auction date: upload then flag to escalation. The agent needs to decide on a new auction date or proceed with sales."},
  {id:65,cat:"Listing",q:"You receive a new upload submission but find one CRM listing and one pre-listing for the same property. Which do you use?",opts:["Use the pre-listing.","Use the CRM listing.","Use whichever was created most recently.","Flag to escalation."],ans:1,exp:"One CRM + one pre-listing: always use the CRM listing."},
  {id:66,cat:"Listing",q:"There is no existing listing at all for the submitted property. What do you do?",opts:["Create a new listing and upload.","Flag to escalation — listing must exist before uploading.","Do not upload — wait for the agent.","Upload under a similar listing if one exists."],ans:0,exp:"No existing listing: proceed to create a new listing."},
  {id:67,cat:"Listing",q:"You find two CRM listings for the same property. Which do you use?",opts:["Use the older listing for continuity.","Use the most recently created CRM listing.","Flag to escalation — two listings shouldn't exist.","Use the one with more data filled in."],ans:1,exp:"Two or more CRM listings: use the most recently created one."},
  {id:68,cat:"Listing",q:"You find a submission and there is only one pre-listing available (no CRM listing). What do you do?",opts:["Upload to the pre-listing.","Create a new CRM listing.","Flag to escalation.","Do not upload until a CRM listing is created."],ans:0,exp:"Only one pre-listing: use the pre-listing."},
  {id:69,cat:"Listing",q:"A listing has Authorities Enabled marked as DO NOT PROCEED. What do you do?",opts:["Proceed — contracts and authorities are separate.","Flag to escalation — DO NOT PROCEED is a stop flag.","Upload anyway and note the flag.","Contact the agent."],ans:1,exp:"DO NOT PROCEED flag on Authorities Enabled: flag to escalation."},
  {id:70,cat:"Listing",q:"You receive a contract upload and notice the property has been marked as Sold in the system. What do you do?",opts:["Proceed — Sold properties can still have contract changes.","Flag to escalation — they will ask if the agent wants to reverse the sale.","Do not upload and wait for the agent.","Contact the agent directly."],ans:1,exp:"Property marked as Sold: flag to escalation. Escalation will use the Similar Listing / Property Marked as Sold template to check with the agent."},
  {id:83,cat:"Process",q:"When you leave a note on the dashboard, what is its purpose?",opts:["To inform the client directly.","To flag the agent about issues in the contract.","To inform the tagging team.","To document your shift activity."],ans:2,exp:"Notes on the dashboard are for the tagging team."},
  {id:84,cat:"Process",q:"When a contract has issues that need actioning, who handles it next?",opts:["The uploader resolves it.","The manager resolves it directly.","The escalation team takes over and contacts the agent.","The agent is contacted directly by the uploader."],ans:2,exp:"The escalation team handles agent communication after flagging."},
  {id:87,cat:"Process",q:"Which of the following issues does the uploader handle by uploading first, then flagging?",opts:["Missing key pages","File too large","Vendor details hardcoded to purchaser field","Wrong file attached"],ans:2,exp:"Vendor hardcoded to purchaser field: upload first, then flag to escalation."},
  {id:88,cat:"Process",q:"Which of the following issues requires DO NOT UPLOAD before flagging to escalation?",opts:["Oversized S32","Vendor hardcoded to purchaser field","Wrong file attached","Self/Executor nature mismatch"],ans:2,exp:"Wrong file attached: DO NOT UPLOAD. Flag to escalation."},
  {id:89,cat:"Process",q:"A vendor name has a minor spelling variation (e.g., Robbi vs Robbie). You proceed and leave a note. What is the note for?",opts:["To inform Robbie of the uploading details.","To inform the tagging team of the exact name on the contract.","To document the decision for your manager.","To let the escalation team know."],ans:1,exp:"Notes are for the tagging team so they know the exact name as it appears on the contract."},
  {id:90,cat:"Process",q:"What does the interchangeable symbol (⇌) mean in the Vendor Nature Matrix?",opts:["The natures are opposite and require escalation.","The natures can appear in either position (submission or contract) and the handling is the same.","The natures are identical.","One nature overrides the other."],ans:1,exp:"⇌ means the natures are interchangeable — either can appear on the submission or contract side and the process remains the same."},
  {id:91,cat:"Process",q:"What should you check when handling a Director of Company / Trustee combination?",opts:["The agent's license number.","Look for 'atf', 'trusted', or 'as trustee for' in the name strip.","The trust deed document.","The property valuation."],ans:1,exp:"Verify the company name in the name strip. Look for \'atf\' or \'as trustee for\' keywords."},
  {id:94,cat:"Process",q:"What is the maximum file size that can be uploaded to the system?",opts:["145MB","153MB","157MB","200MB"],ans:2,exp:"The maximum file size is 157MB. Files under this threshold can be uploaded."},
  {id:99,cat:"Process",q:"A vendor has a nickname (e.g., submission says Rob but contract says Robbie). What is the process?",opts:["Do not upload — names don't match.","Upload only if the escalation team approves first.","Upload and then flag to escalation.","Flag to escalation only, do not upload."],ans:2,exp:"Nicknames: upload first, then flag to escalation."},
  {id:100,cat:"Process",q:"Which is the complete and correct process for handling a submission with missing key pages?",opts:["Upload the partial document, flag to escalation, and leave a note.","DO NOT UPLOAD. Flag to escalation. Escalation team will contact the agent.","Contact the agent directly and wait for the corrected file.","Upload, contact the agent, and log the issue."],ans:1,exp:"Missing key pages: DO NOT UPLOAD. Flag to escalation. The escalation team handles agent communication."},

<script>
/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
var cu=null, credits=0, creditsLoaded=false, musicOn=false, musicVol=0.22;
var audioCtx=null, musicNodes=[], musicTimer=null, currentGame=null;

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function G(id){return document.getElementById(id);}
function toast(msg){
  var t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.transition='opacity .4s';t.style.opacity='0';setTimeout(function(){t.remove();},400);},2200);
}

/* ═══════════════════════════════════════════════════
   IN-GAME SOUNDS
═══════════════════════════════════════════════════ */
function ensureAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function sfx(freq,dur,vol,type,delay){
  ensureAudio();
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=type||'square';o.frequency.setValueAtTime(freq,audioCtx.currentTime+(delay||0));
  g.gain.setValueAtTime(0,audioCtx.currentTime+(delay||0));
  g.gain.linearRampToValueAtTime((vol||0.08),audioCtx.currentTime+(delay||0)+0.01);
  g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+(delay||0)+dur);
  o.start(audioCtx.currentTime+(delay||0));
  o.stop(audioCtx.currentTime+(delay||0)+dur+0.05);
}
var SND={
  click:  function(){sfx(800,.05,.06,'square');},
  flag:   function(){sfx(600,.06,.06,'square');sfx(900,.04,.04,'square',.06);},
  reveal: function(){sfx(400,.04,.05,'sine');},
  boom:   function(){sfx(100,.3,.15,'sawtooth');sfx(60,.5,.1,'sawtooth',.1);},
  win:    function(){[523,659,784,1047].forEach(function(f,i){sfx(f,.18,.08,'sine',i*.15);});},
  move:   function(){sfx(440,.05,.05,'sine');},
  capture:function(){sfx(300,.1,.1,'sawtooth');sfx(200,.08,.06,'sawtooth',.08);},
  card:   function(){sfx(600,.04,.05,'square');},
  uno:    function(){sfx(880,.1,.1,'square');sfx(1100,.08,.08,'square',.1);},
  wrong:  function(){sfx(200,.15,.08,'sawtooth');},
  correct:function(){sfx(660,.08,.08,'sine');sfx(880,.08,.06,'sine',.08);},
  draw:   function(){sfx(350,.06,.05,'triangle');},
};

/* ── BACKGROUND MUSIC LOOP (3 rotating themes) ── */
var _bgmTimer=null,_bgmTrack=0,_bgmPlaying=false;
var _bgmTracks=[
  /* Track 0 — upbeat chiptune */
  function(){
    var n=[[523,.12],[659,.12],[784,.12],[1047,.12],[784,.12],[659,.12],[523,.12],[440,.12]];
    n.forEach(function(p,i){sfx(p[0],p[1],.04,'square',i*0.14);});
  },
  /* Track 1 — jazzy arpeggio */
  function(){
    var n=[[392,.1],[494,.1],[587,.1],[740,.1],[587,.1],[494,.1],[392,.1],[330,.1]];
    n.forEach(function(p,i){sfx(p[0],p[1],.035,'triangle',i*0.13);});
    var bass=[[196,.2],[220,.2],[196,.2],[185,.2]];
    bass.forEach(function(p,i){sfx(p[0],p[1],.025,'sine',i*0.26);});
  },
  /* Track 2 — chill lo-fi feel */
  function(){
    var n=[[349,.15],[440,.15],[523,.15],[440,.15],[349,.15],[294,.15],[262,.15],[294,.15]];
    n.forEach(function(p,i){sfx(p[0],p[1],.03,'sine',i*0.18);});
    var c=[[131,.3],[147,.3],[131,.3],[123,.3]];
    c.forEach(function(p,i){sfx(p[0],p[1],.02,'triangle',i*0.36);});
  }
];
function bgmPlay(){
  if(!_bgmPlaying)return;
  ensureAudio();
  _bgmTracks[_bgmTrack]();
  _bgmTrack=(_bgmTrack+1)%_bgmTracks.length;
  var dur=_bgmTrack===0?1900:_bgmTrack===1?1900:2600;
  _bgmTimer=setTimeout(bgmPlay,dur);
}
function bgmStart(){
  if(_bgmPlaying)return;
  _bgmPlaying=true;_bgmTrack=0;
  bgmPlay();
}
function bgmStop(){
  _bgmPlaying=false;
  if(_bgmTimer){clearTimeout(_bgmTimer);_bgmTimer=null;}
}

/* ═══════════════════════════════════════════════════
   CREDITS
═══════════════════════════════════════════════════ */
function updateCreditUI(){
  var el=G('credit-pill');if(el)el.textContent='🎮 '+credits+' credit'+(credits!==1?'s':'');
  renderCardLock();
}
var GAME_COSTS={minesweeper:1,wordguess:1,solitaire:1,millionaire:10,dealornodeal:5,kbquiz:1,chess:1,uno:1,tongits:3,fps:5};
var CREDIT_COST_NORMAL=1; /* fallback */

function spendCredit(cost,cb){
  if(!cu){toast('Not signed in — open the Portal first.');return;}
  if(cu.role==='manager'){cb();return;}
  if(!creditsLoaded){
    db.collection('player_credits').doc(cu.nickname.toLowerCase()).get().then(function(snap){
      credits=snap.exists?(snap.data().credits||0):0;creditsLoaded=true;updateCreditUI();spendCredit(cost,cb);
    }).catch(function(){cb();});
    return;
  }
  if(credits<cost){toast('Not enough credits! You need '+cost+' to play. Ask your manager to top up. 🎮');return;}
  credits-=cost;updateCreditUI();
  db.collection('player_credits').doc(cu.nickname.toLowerCase()).set({credits:credits},{merge:true}).catch(function(){});
  cb();
}

function gcAwardGameCredit(nick,amount){
  /* Award credits from game wins — subject to daily cap */
  if(gcIsManager()){awardCredit(nick,amount);return;}
  var effective=gcCapAward(amount);
  if(effective<=0){
    /* Cap hit — play continues but no credit awarded. Silent. */
    return;
  }
  gcAddDayCredits(effective);
  awardCredit(nick,effective);
}

function awardCredit(nick,amount){
  var key=nick.toLowerCase();
  db.collection('player_credits').doc(key).get().then(function(snap){
    var c=snap.exists?(snap.data().credits||0):0;
    var nc=c+amount;
    db.collection('player_credits').doc(key).set({credits:nc},{merge:true});
    if(cu&&cu.nickname.toLowerCase()===key){credits=nc;updateCreditUI();}
  }).catch(function(){});
}

/* ── MANAGER HUB — Credits + Shifts + Badge Requests ── */
var _allCredits={};
var _gcShifts={};  /* {nick: {start:'09:00', end:'18:00'}} */

function renderMgrPanel(){
  var pane=G('mgr-pane');if(!pane)return;
  pane.innerHTML=
    '<div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px">👑 Manager Hub</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:14px">'
    +'<button class="mgr-tab mgr-tab-on" id="mt-credits" onclick="mgrSwitchTab(\'credits\')">💰 Credits</button>'
    +'<button class="mgr-tab" id="mt-shifts" onclick="mgrSwitchTab(\'shifts\')">🕐 Shifts</button>'
    +'<button class="mgr-tab" id="mt-requests" onclick="mgrSwitchTab(\'requests\')">🎖 Requests</button>'
    +'<button class="mgr-tab" id="mt-team" onclick="mgrSwitchTab(\'team\')">👥 Team</button>'
    +'</div>'
    +'<div id="mgr-tab-credits"></div>'
    +'<div id="mgr-tab-shifts" style="display:none"></div>'
    +'<div id="mgr-tab-requests" style="display:none"></div>'
    +'<div id="mgr-tab-team" style="display:none"></div>';

  /* Inject tab CSS once */
  if(!G('mgr-tab-style')){
    var st=document.createElement('style');st.id='mgr-tab-style';
    st.textContent='.mgr-tab{font-size:11px;padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .12s;}'
      +'.mgr-tab:hover{border-color:var(--accent);color:var(--text);}'
      +'.mgr-tab-on{background:rgba(124,58,237,.18);border-color:var(--accent);color:var(--accent2);font-weight:600;}';
    document.head.appendChild(st);
  }

  mgrRenderCredits();
  mgrLoadShifts();
  mgrRenderRequests();
}

function mgrSwitchTab(tab){
  ['credits','shifts','requests','team'].forEach(function(t){
    var pane=G('mgr-tab-'+t);if(pane)pane.style.display=t===tab?'':'none';
    var btn=G('mt-'+t);if(btn)btn.className='mgr-tab'+(t===tab?' mgr-tab-on':'');
  });
}

/* ── CREDITS TAB ── */
function mgrRenderCredits(){
  var pane=G('mgr-tab-credits');if(!pane)return;
  var members=_allCredits;
  var keys=Object.keys(members);
  if(!keys.length){pane.innerHTML='<div style="font-size:11px;color:var(--muted)">Loading…</div>';return;}
  var html='';
  keys.sort().forEach(function(nick){
    var c=members[nick];
    var sh=_gcShifts[nick];
    var shLabel=sh?sh.start+'–'+sh.end:'no shift set';
    html+='<div style="margin-bottom:8px;padding:10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-size:12px;font-weight:600;color:var(--text)">'+nick+'</div>'
          +'<div style="font-size:10px;color:var(--muted)" id="credit-lbl-'+nick+'">'+c+' credit'+(c!==1?'s':'')+' · '+shLabel+'</div>'
        +'</div>'
        +'<button onclick="mgrAdjCredit(\''+nick+'\',-1)" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">−</button>'
        +'<button onclick="mgrAdjCredit(\''+nick+'\',1)" style="width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--accent);color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">+</button>'
      +'</div>'
      +'<div style="display:flex;gap:6px;align-items:center">'
        +'<input id="credit-input-'+nick+'" type="number" min="0" value="'+c+'" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;" placeholder="Set amount">'
        +'<button onclick="mgrSetCredit(\''+nick+'\')" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--accent);background:rgba(124,58,237,.15);color:var(--accent2);cursor:pointer;white-space:nowrap">Set</button>'
      +'</div>'
    +'</div>';
  });
  pane.innerHTML=html||'<div style="font-size:11px;color:var(--muted)">No members found.</div>';
}

function mgrAdjCredit(nick,delta){
  db.collection('player_credits').doc(nick).get().then(function(snap){
    var c=snap.exists?(snap.data().credits||0):0;
    var nc=Math.max(0,c+delta);
    db.collection('player_credits').doc(nick).set({credits:nc},{merge:true}).then(function(){
      _allCredits[nick]=nc;mgrRenderCredits();
      toast((delta>0?'+1':'−1')+' credit for '+nick+' → '+nc);
    });
  }).catch(function(){toast('Error updating credits.');});
}

function mgrSetCredit(nick){
  var el=G('credit-input-'+nick);if(!el)return;
  var val=parseInt(el.value)||0;
  if(val<0){toast('Cannot set negative credits');return;}
  db.collection('player_credits').doc(nick).set({credits:val},{merge:true}).then(function(){
    _allCredits[nick]=val;mgrRenderCredits();
    toast('Credits for '+nick+' set to '+val);
  }).catch(function(){toast('Error updating credits.');});
}

function loadAllCredits(){
  db.collection('player_credits').get().then(function(snap){
    snap.forEach(function(d){
      var key=d.id.toLowerCase();
      var val=d.data().credits||0;
      _allCredits[key]=Math.max(_allCredits[key]||0,val);
      if(d.id!==key){
        db.collection('player_credits').doc(key).set({credits:_allCredits[key]},{merge:true});
        db.collection('player_credits').doc(d.id).delete();
      }
    });
    db.collection('player_credits').onSnapshot(function(snap){
      snap.forEach(function(d){_allCredits[d.id.toLowerCase()]=d.data().credits||0;});
      mgrRenderCredits();
    });
    mgrRenderCredits();
  }).catch(function(){var p=G('mgr-pane');if(p)p.innerHTML='<div style="font-size:11px;color:var(--muted)">Could not load credits.</div>';});
}

/* ── SHIFTS TAB ── */
function mgrLoadShifts(){
  if(!db)return;
  db.collection('gc_settings').doc('shifts').get().then(function(snap){
    _gcShifts=snap.exists?(snap.data()||{}):{};
    mgrRenderShifts();
    mgrRenderCredits(); /* refresh credit tab to show shift labels */
  }).catch(function(){mgrRenderShifts();});
}

function mgrRenderShifts(){
  var pane=G('mgr-tab-shifts');if(!pane)return;
  /* Build member list from _allCredits keys + any extras from _gcShifts */
  var nicks=Object.keys(_allCredits);
  if(!nicks.length&&!Object.keys(_gcShifts).length){
    pane.innerHTML='<div style="font-size:11px;color:var(--muted)">No members loaded yet. Ensure Credits tab has loaded first.</div>';return;
  }
  /* Add any nicks in shifts but not in credits */
  Object.keys(_gcShifts).forEach(function(n){if(!nicks.includes(n))nicks.push(n);});
  nicks.sort();
  var html='<div style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5">Set each member\'s shift window. Game Corner locks outside these hours. Changes save immediately to Firestore and apply within seconds.</div>';
  nicks.forEach(function(nick){
    var sh=_gcShifts[nick]||{start:'09:00',end:'18:00'};
    html+='<div style="margin-bottom:8px;padding:10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)">'
      +'<div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">'+nick+'</div>'
      +'<div style="display:flex;align-items:center;gap:6px">'
        +'<input type="time" id="shift-start-'+nick+'" value="'+(sh.start||'09:00')+'" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;">'
        +'<span style="font-size:12px;color:var(--muted)">to</span>'
        +'<input type="time" id="shift-end-'+nick+'" value="'+(sh.end||'18:00')+'" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;">'
        +'<button onclick="mgrSaveShift(\''+nick+'\')" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--accent);background:rgba(124,58,237,.15);color:var(--accent2);cursor:pointer;white-space:nowrap">Save</button>'
      +'</div>'
    +'</div>';
  });
  html+='<button onclick="mgrSaveAllShifts()" style="width:100%;margin-top:4px;padding:9px;font-size:12px;font-weight:600;border-radius:8px;border:1px solid var(--accent);background:rgba(124,58,237,.2);color:var(--accent2);cursor:pointer;">Save all shifts</button>';
  pane.innerHTML=html;
}

function mgrSaveShift(nick){
  var startEl=G('shift-start-'+nick),endEl=G('shift-end-'+nick);
  if(!startEl||!endEl)return;
  var start=startEl.value,end=endEl.value;
  if(!start||!end){toast('Please set both start and end times');return;}
  _gcShifts[nick.toLowerCase()]={start:start,end:end};
  db.collection('gc_settings').doc('shifts').set(_gcShifts,{merge:false}).then(function(){
    toast('Shift saved for '+nick+': '+start+' – '+end);
    mgrRenderCredits();
  }).catch(function(e){toast('Error: '+e.message);});
}

function mgrSaveAllShifts(){
  var nicks=Object.keys(_allCredits);
  nicks.forEach(function(nick){
    var startEl=G('shift-start-'+nick),endEl=G('shift-end-'+nick);
    if(startEl&&endEl&&startEl.value&&endEl.value){
      _gcShifts[nick]={start:startEl.value,end:endEl.value};
    }
  });
  db.collection('gc_settings').doc('shifts').set(_gcShifts,{merge:false}).then(function(){
    toast('All shifts saved ✓');mgrRenderCredits();
  }).catch(function(e){toast('Error: '+e.message);});
}

/* ── BADGE REQUESTS TAB ── */
function mgrRenderRequests(){
  var pane=G('mgr-tab-requests');if(!pane)return;
  pane.innerHTML='<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">Loading requests…</div>';
  db.collection('gc_badge_requests').where('status','==','pending').get().then(function(snap){
    if(snap.empty){pane.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0;">No pending badge requests 🎉</div>';return;}
    pane.innerHTML='';
    /* Sort client-side by createdAt desc (avoids composite index requirement) */
    var docs=[];snap.forEach(function(d){docs.push(d);});
    docs.sort(function(a,b){return(b.data().createdAt||0)-(a.data().createdAt||0);});
    docs.forEach(function(doc){
      var req=doc.data();
      var item=SHOP_ITEMS.find(function(i){return i.id===req.itemId;})||{name:req.itemId,icon:'🎖'};
      var extra='';
      if(req.extra&&req.extra.date)extra+='<div style="font-size:10px;color:var(--muted);margin-top:3px;">📅 Date: '+req.extra.date+'</div>';
      if(req.extra&&req.extra.ticket)extra+='<div style="font-size:10px;color:var(--muted);margin-top:3px;">🎫 Ref: '+req.extra.ticket+'</div>';
      if(req.extra&&req.extra.notes)extra+='<div style="font-size:10px;color:var(--muted);margin-top:3px;">📝 '+req.extra.notes+'</div>';
      var div=document.createElement('div');
      div.style.cssText='padding:10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:8px;';
      div.innerHTML='<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;">'
        +'<span style="font-size:18px;flex-shrink:0">'+item.icon+'</span>'
        +'<div style="flex:1;min-width:0;">'
          +'<div style="font-size:12px;font-weight:600;color:var(--text)">'+req.nick+' — '+item.name+'</div>'
          +'<div style="font-size:11px;color:var(--muted)">'+new Date(req.createdAt).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</div>'
          +extra
        +'</div></div>'
        +'<div style="display:flex;gap:6px;">'
        +'<button onclick="gcMgrApproveFromPanel(\''+doc.id+'\')" style="flex:1;font-size:11px;padding:6px;border-radius:7px;border:1px solid var(--green);background:rgba(34,197,94,.12);color:var(--green);cursor:pointer;font-weight:600;">Approve</button>'
        +'<button onclick="gcMgrDiscardFromPanel(\''+doc.id+'\')" style="flex:1;font-size:11px;padding:6px;border-radius:7px;border:1px solid var(--red);background:rgba(239,68,68,.1);color:var(--red);cursor:pointer;">Discard</button>'
        +'</div>';
      pane.appendChild(div);
    });
  }).catch(function(){pane.innerHTML='<div style="font-size:11px;color:var(--muted)">Could not load requests. Firestore index may be needed.</div>';});
}


/* ── TEAM TAB ── */
function mgrRenderTeam(){
  var pane=G('mgr-tab-team');if(!pane)return;
  /* Load team from gc_team_setup or fall back to _allCredits keys */
  /* Always build from _allCredits keys (loaded on panel open) merged with any saved team data */
  db.collection('gc_settings').doc('team').get().then(function(snap){
    var saved=snap.exists?(snap.data().members||[]):[];
    /* Start from allCredits so every member appears even if team doc is empty */
    var nicks=Object.keys(_allCredits);
    if(!nicks.length){
      /* Credits not loaded yet — try loading them first */
      loadAllCredits();
      pane.innerHTML='<div style="font-size:11px;color:var(--muted)">Loading members… if this persists, click Credits tab first then return here.</div>';
      return;
    }
    var teamData=nicks.map(function(n){
      var saved_entry=saved.find(function(m){return m.nick===n;})||{};
      return{nick:n,fullName:saved_entry.fullName||'',role:saved_entry.role||'uploader'};
    });
    /* Also add any in saved but not in credits */
    saved.forEach(function(m){if(!teamData.find(function(t){return t.nick===m.nick;}))teamData.push(m);});
    teamData.sort(function(a,b){return a.nick.localeCompare(b.nick);});
    pane.innerHTML='';
    var info=document.createElement('div');
    info.style.cssText='font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5;';
    info.textContent='Set each member display name and role. Roles control Game Corner access. Managers bypass all restrictions.';
    pane.appendChild(info);
    teamData.forEach(function(member){
      var div=document.createElement('div');
      div.style.cssText='padding:10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:8px;';
      div.innerHTML='<div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;">'+member.nick+'</div>'
        +'<div style="display:flex;flex-direction:column;gap:6px;">'
        +'<input type="text" id="team-name-'+member.nick+'" value="'+(member.fullName||'')+'" placeholder="Full name" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;width:100%;">'
        +'<select id="team-role-'+member.nick+'" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;width:100%;">'
        +'<option value="uploader"'+(member.role==='uploader'?' selected':'')+'>Uploader</option>'
        +'<option value="escalation"'+(member.role==='escalation'?' selected':'')+'>Escalation</option>'
        +'<option value="manager"'+(member.role==='manager'?' selected':'')+'>Manager</option>'
        +'</select>'
        +'<button onclick="mgrSaveTeamMember(\''+member.nick+'\')" style="font-size:11px;padding:5px;border-radius:6px;border:1px solid var(--accent);background:rgba(124,58,237,.15);color:var(--accent2);cursor:pointer;">Save</button>'
        +'</div>';
      pane.appendChild(div);
    });
    var addDiv=document.createElement('div');
    addDiv.style.cssText='padding:10px;background:var(--surface2);border-radius:8px;border:1px dashed var(--border);margin-bottom:8px;';
    addDiv.innerHTML='<div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Add new member</div>'
      +'<div style="display:flex;gap:6px;">'
      +'<input type="text" id="new-member-nick" placeholder="Nickname (lowercase)" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:12px;">'
      +'<button onclick="mgrAddTeamMember()" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--accent);background:rgba(124,58,237,.15);color:var(--accent2);cursor:pointer;white-space:nowrap;">Add</button>'
      +'</div>';
    pane.appendChild(addDiv);
  }).catch(function(){
    pane.innerHTML='<div style="font-size:11px;color:var(--muted)">Could not load team data.</div>';
  });
}

function mgrSaveTeamMember(nick){
  var nameEl=G('team-name-'+nick),roleEl=G('team-role-'+nick);
  if(!nameEl||!roleEl)return;
  var fullName=nameEl.value.trim(),role=roleEl.value;
  db.collection('gc_settings').doc('team').get().then(function(snap){
    var members=snap.exists?(snap.data().members||[]):[];
    var idx=members.findIndex(function(m){return m.nick===nick;});
    if(idx>-1)members[idx]={nick:nick,fullName:fullName,role:role};
    else members.push({nick:nick,fullName:fullName,role:role});
    db.collection('gc_settings').doc('team').set({members:members}).then(function(){
      toast('Saved: '+nick+' ('+role+')');
      if(cu&&nick===cu.nickname.toLowerCase()){
        localStorage.setItem('lounge_role',role);
        cu.role=role;
      }
    });
  }).catch(function(e){toast('Error: '+e.message);});
}

function mgrAddTeamMember(){
  var el=G('new-member-nick');
  if(!el||!el.value.trim())return;
  var nick=el.value.trim().toLowerCase();
  db.collection('gc_settings').doc('team').get().then(function(snap){
    var members=snap.exists?(snap.data().members||[]):[];
    if(members.find(function(m){return m.nick===nick;})){toast(nick+' already exists');return;}
    members.push({nick:nick,fullName:'',role:'uploader'});
    db.collection('gc_settings').doc('team').set({members:members}).then(function(){
      /* Initialise credits to 0 */
      db.collection('player_credits').doc(nick).set({credits:0},{merge:true});
      el.value='';toast('Added: '+nick);
      mgrRenderTeam();
    });
  }).catch(function(e){toast('Error: '+e.message);});
}

/* renderMgrPanel defined above */

function mgrAdjCredit(nick,delta){
  db.collection('player_credits').doc(nick).get().then(function(snap){
    var c=snap.exists?(snap.data().credits||0):0;
    var nc=Math.max(0,c+delta); /* no cap */
    db.collection('player_credits').doc(nick).set({credits:nc},{merge:true}).then(function(){
      _allCredits[nick]=nc;
      renderMgrPanel();
      toast((delta>0?'+1 credit':'−1 credit')+' for '+nick+' → '+nc+' total');
    });
  }).catch(function(){toast('Error updating credits.');});
}

function loadAllCredits(){
  db.collection('player_credits').get().then(function(snap){
    /* Normalize to lowercase — merge any duplicates by taking the higher value */
    snap.forEach(function(d){
      var key=d.id.toLowerCase();
      var val=d.data().credits||0;
      _allCredits[key]=Math.max(_allCredits[key]||0,val);
      /* If this doc had uppercase key, migrate it */
      if(d.id!==key){
        db.collection('player_credits').doc(key).set({credits:_allCredits[key]},{merge:true});
        db.collection('player_credits').doc(d.id).delete();
      }
    });
    db.collection('player_credits').onSnapshot(function(snap){
      snap.forEach(function(d){_allCredits[d.id.toLowerCase()]=d.data().credits||0;});
      renderMgrPanel();
    });
    renderMgrPanel();
  }).catch(function(){var p=G('mgr-pane');if(p)p.innerHTML='<div style="font-size:11px;color:var(--muted)">Could not load credits.</div>';});
}

/* ── 10-movement arrangement: Lo-fi → Bossa×2 → Original → Waltz → Bossa → Lo-fi → Original → Waltz → Lo-fi ── */
var _BGM_SEQ=[
  'lofi','bossa','bossa','original','waltz','bossa','lofi','original','waltz','lofi'
];
var _bgmMovIdx=0;
var _bgmTimer=null;
var _musicThemeIdx=0; /* kept for legacy compat */
function pNote(f,t,d,vol,type){
  if(!f||!audioCtx)return;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type=type||'sine';o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.08);
  g.gain.setValueAtTime(vol,t+d*.7);g.gain.linearRampToValueAtTime(0,t+d);
  o.start(t);o.stop(t+d+.05);musicNodes.push(o);
}
function schedMusic(){
  if(!musicOn||!audioCtx)return;
  var key=_BGM_SEQ[_bgmMovIdx];
  var th=_TDEFS[key];
  var now=audioCtx.currentTime,beat=th.beat,t=now+.1;
  th.mel.forEach(function(n){var f=NF[n[0]],d=n[1]*beat;if(f)pNote(f,t,d*.82,musicVol*th.mv/.038,th.mT);t+=d;});
  var bt=now+.1;th.bass.forEach(function(n){var f=NF[n[0]],d=n[1]*beat;if(f)pNote(f,bt,d*.9,musicVol*th.bv/.016,th.bT);bt+=d;});
  var loop=th.mel.reduce(function(s,n){return s+n[1]*beat;},0);
  _bgmMovIdx=(_bgmMovIdx+1)%_BGM_SEQ.length;
  musicTimer=setTimeout(schedMusic,(loop-.12)*1000);
}
function musicUI(on){
  document.querySelectorAll('.eq-b').forEach(function(b){b.classList.toggle('off',!on);});
  var ic=G('snd-icon');if(ic)ic.textContent=on?'🔊':'🔈';
  var btn=G('music-toggle-btn');if(btn)btn.textContent=on?'⏸ Pause':'▶ Play';
}
function startMusic(){ensureAudio();musicOn=true;_bgmMovIdx=0;_musicThemeIdx=0;musicUI(true);schedMusic();}
function stopMusic(){musicOn=false;clearTimeout(musicTimer);musicTimer=null;musicNodes.forEach(function(n){try{n.stop();}catch(e){}});musicNodes=[];musicUI(false);}
function toggleMusic(){musicOn?stopMusic():startMusic();}
function setVol(v){musicVol=parseFloat(v);var l=G('vol-label');if(l)l.textContent=Math.round(v*100)+'%';}
function toggleSndPanel(){
  var p=G('snd-panel');p.classList.toggle('open');
  if(p.classList.contains('open')){
    setTimeout(function(){
      document.addEventListener('click',function close(e){
        if(!p.contains(e.target)&&!G('snd-btn').contains(e.target)){p.classList.remove('open');document.removeEventListener('click',close);}
      });
    },10);
  }
}

function gcGetSydneyDay(){
  /* Returns 0=Sun,1=Mon...6=Sat in Sydney time */
  return new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Sydney'})).getDay();
}

function gcIsWeekend(){
  var d=gcGetSydneyDay();
  return d===0||d===6;
}

/* Shift data loaded from gc_settings/shifts Firestore doc */
var _gcShiftsLoaded=false;
/* ── Load shifts from Firestore BEFORE rendering the grid ── */
function gcLoadShiftsFromFirestore(){
  if(!db||_gcShiftsLoaded)return;
  _gcShiftsLoaded=true;
  var firstLoad=true;
  db.collection('gc_settings').doc('shifts').onSnapshot(function(snap){
    if(snap.exists)_gcShifts=snap.data()||{};
    if(firstLoad){
      firstLoad=false;
      /* Re-render grid now that shifts are known */
      renderGrid();
    }
  },function(){
    /* Firestore error — render anyway so page isn't blank */
    if(firstLoad){firstLoad=false;renderGrid();}
  });
}

function gcIsInShift(){
  if(!cu)return false;
  if(cu.role&&cu.role.toLowerCase()==='manager')return true;
  /* Normalize to lowercase — Firestore keys are stored lowercase */
  var nick=cu.nickname.toLowerCase();
  /* Try Firestore-backed _gcShifts first, then localStorage fallback */
  var sh=_gcShifts&&(_gcShifts[nick]||_gcShifts[cu.nickname]);
  if(!sh){
    try{
      var lsShifts=JSON.parse(localStorage.getItem('rta_SHIFTS')||'{}');
      var lsSh=lsShifts[nick];
      if(lsSh&&lsSh.start!==undefined){
        /* Convert decimal hours to HH:MM string for comparison */
        var s=lsSh.start,e=lsSh.end;
        var sH=Math.floor(s),sM=Math.round((s-sH)*60);
        var eH=Math.floor(e),eM=Math.round((e-eH)*60);
        sh={start:(sH<10?'0':'')+sH+':'+(sM<10?'0':'')+sM, end:(eH<10?'0':'')+eH+':'+(eM<10?'0':'')+eM};
      }
    }catch(e){}
  }
  if(!sh)return false;
  var now=new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Sydney'}));
  var h=now.getHours(),m=now.getMinutes();
  var tot=h*60+m;
  /* sh.start and sh.end are 'HH:MM' strings */
  function toMins(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]||0);}
  return tot>=toMins(sh.start)&&tot<toMins(sh.end);
}

function gcIsOutsideShift(){
  return gcIsWeekend()||!gcIsInShift();
}

function gcEffectiveCap(){
  /* 5 credits outside shift/weekend, 25 during shift */
  return gcIsOutsideShift()?5:GC.DAILY_GAME_CAP;
}

function gcCheckAccess(){
  if(gcIsManager())return{ok:true};
  /* No shift lockout — credit cap handles abuse prevention instead */
  /* Session cooldown still applies */
  if(!gcSessionCooldownOk()){
    var endTime=parseInt(localStorage.getItem('gc_session_end_'+(cu?cu.nickname:'x'))||'0');
    var remMs=GC.SESSION_COOLDOWN*1000-(Date.now()-endTime);
    var remMins=Math.ceil(remMs/60000);
    return{ok:false,reason:'Session cooldown active.',sub:'Next session opens in ~'+remMins+' minute'+(remMins!==1?'s':'')+'. Back to work! 💪',icon:'ti-refresh'};
  }
  return{ok:true};
}

function gcGetTodayKey(){
  var d=new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Sydney'}));
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function gcGetDayCredits(){
  /* Track daily game credits earned in sessionStorage (resets per calendar day) */
  var key='gc_daycred_'+(cu?cu.nickname:'x')+'_'+gcGetTodayKey();
  return parseInt(sessionStorage.getItem(key)||'0');
}

function gcAddDayCredits(n){
  var key='gc_daycred_'+(cu?cu.nickname:'x')+'_'+gcGetTodayKey();
  var cur=gcGetDayCredits();
  sessionStorage.setItem(key,cur+n);
}

function gcCapAward(raw){
  /* Cap depends on shift status: 25 during shift, 5 outside shift/weekend */
  if(gcIsManager())return raw;
  var cap=gcEffectiveCap();
  var spent=gcGetDayCredits();
  var remaining=Math.max(0,cap-spent);
  return Math.min(raw,remaining);
}

function gcStartSession(){
  if(gcIsManager())return;
  GC._elapsed=parseInt(localStorage.getItem('gc_sess_el_'+(cu?cu.nickname:'x'))||'0');
  GC._extensions=parseInt(localStorage.getItem('gc_sess_ext_'+(cu?cu.nickname:'x'))||'0');
  GC._warned=false;
  clearInterval(GC._timer);
  GC._timer=setInterval(function(){
    GC._elapsed++;
    localStorage.setItem('gc_sess_el_'+(cu?cu.nickname:'x'),GC._elapsed);
    var limit=GC.SESSION_LIMIT+GC._extensions*GC.EXTEND_SECS;
    var remaining=limit-GC._elapsed;
    /* Only show timer bar when under 5 min */
    if(remaining<=GC.WARN_AT){
      gcUpdateTimerUI(remaining);
      if(!GC._warned){
        GC._warned=true;
        gcShowExtendPrompt(remaining);
      }
    }
    if(remaining<=0){
      gcEndSession();
    }
  },1000);
}

function gcStopSession(){
  clearInterval(GC._timer);GC._timer=null;
}

function gcResetSession(){
  localStorage.removeItem('gc_sess_el_'+(cu?cu.nickname:'x'));
  localStorage.removeItem('gc_sess_ext_'+(cu?cu.nickname:'x'));
  GC._elapsed=0;GC._warned=false;GC._extensions=0;
}

function gcUpdateTimerUI(remaining){
  var el=G('gc-timer-bar');
  if(!el)return;
  var mins=Math.floor(remaining/60),secs=remaining%60;
  var label=el.querySelector('#gc-timer-label');
  if(label)label.textContent=mins+':'+(secs<10?'0':'')+secs+' left';
  var limit=GC.SESSION_LIMIT+GC._extensions*GC.EXTEND_SECS;
  var bar=el.querySelector('#gc-timer-fill');
  if(bar){
    var pct=Math.max(0,remaining/GC.WARN_AT*100); /* fill relative to warning window */
    bar.style.width=Math.min(100,pct)+'%';
    bar.style.background=remaining<=60?'var(--color-background-danger)':'var(--color-background-warning)';
  }
  el.style.display='flex';
}

function gcShowExtendPrompt(remaining){
  /* Remove any existing prompt */
  var old=G('gc-extend-prompt');if(old)old.remove();
  var grid=G('game-grid');if(!grid)return;
  var canExtend=GC._extensions<GC.MAX_EXTENSIONS;
  var prompt=document.createElement('div');
  prompt.id='gc-extend-prompt';
  prompt.style.cssText='padding:12px 14px;background:var(--color-background-danger);border:1.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);margin-bottom:8px;display:flex;align-items:center;gap:12px;';
  var extsLeft=GC.MAX_EXTENSIONS-GC._extensions; /* unlimited — not shown */
  prompt.innerHTML='<i class="ti ti-alarm" style="font-size:22px;color:var(--color-text-danger);flex-shrink:0" aria-hidden="true"></i>'
    +'<div style="flex:1;min-width:0;">'
    +'<div style="font-size:13px;font-weight:500;color:var(--color-text-danger);">Session ending soon</div>'
    +'<div style="font-size:12px;color:var(--color-text-danger);opacity:.85;">'+(canExtend?'Extend session · 10 credits each':'No more extensions available')+'</div>'
    +'</div>';
  if(canExtend){
    var extBtn=document.createElement('button');
    extBtn.style.cssText='flex-shrink:0;padding:8px 16px;background:var(--color-background-primary);border:1.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);font-size:13px;font-weight:500;color:var(--color-text-danger);cursor:pointer;white-space:nowrap;';
    extBtn.textContent='+5 min · 10 cr';
    extBtn.onclick=function(){gcExtendSession();};
    prompt.appendChild(extBtn);
  }
  /* Insert after timer bar or at top of grid */
  var timerBar=G('gc-timer-bar');
  if(timerBar&&timerBar.nextSibling){grid.insertBefore(prompt,timerBar.nextSibling);}
  else{grid.insertBefore(prompt,grid.firstChild);}
}

function gcExtendSession(){
  if(GC._extensions>=GC.MAX_EXTENSIONS){toast('Maximum extensions reached');return;}
  spendCredit(GC.EXTEND_COST,function(){
    GC._extensions++;
    localStorage.setItem('gc_sess_ext_'+(cu?cu.nickname:'x'),GC._extensions);
    GC._warned=false; /* reset so next warn fires again at next 5-min threshold */
    /* Remove prompt */
    var p=G('gc-extend-prompt');if(p)p.remove();
    /* Hide timer bar again — will reappear at next 5-min threshold */
    var bar=G('gc-timer-bar');if(bar)bar.style.display='none';
    toast('⏱️ +5 minutes added!');
  });
}

function gcEndSession(){
  gcStopSession();
  /* Record when session ended for 1hr cooldown */
  var endTime=Date.now();
  localStorage.setItem('gc_session_end_'+(cu?cu.nickname:'x'),endTime);
  GC._sessionEndTime=endTime;
  gcResetSession();
  if(G('game-modal')&&G('game-modal').classList.contains('open'))closeModal();
  var grid=G('game-grid');
  if(grid){
    grid.innerHTML='<div style="text-align:center;padding:48px 20px;">'
      +'<div style="width:56px;height:56px;border-radius:50%;background:var(--color-background-danger);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">'
      +'<i class="ti ti-hourglass-empty" style="font-size:26px;color:var(--color-text-danger)" aria-hidden="true"></i></div>'
      +'<div style="font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;">Session time is up</div>'
      +'<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;line-height:1.5;">Your session has ended. A new session opens<br>1 hour from now — if you are still on shift.</div>'
      +'<div style="font-size:12px;padding:8px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);display:inline-block;color:var(--color-text-tertiary);">Refreshes at '+gcNextSessionTime()+'</div>'
      +'</div>';
  }
}

function gcNextSessionTime(){
  var t=new Date(Date.now()+GC.SESSION_COOLDOWN*1000);
  var h=t.getHours(),m=t.getMinutes();
  return h+':'+(m<10?'0':'')+m;
}

function gcSessionCooldownOk(){
  if(gcIsManager())return true;
  var endTime=parseInt(localStorage.getItem('gc_session_end_'+(cu?cu.nickname:'x'))||'0');
  if(!endTime)return true;
  return Date.now()-endTime>=GC.SESSION_COOLDOWN*1000;
}

function gcCooldownOk(){
  if(gcIsManager())return true;
  var now=Date.now();
  return now-GC._lastGameEnd>=GC.GAME_COOLDOWN*1000;
}

function gcCooldownRemaining(){
  var rem=Math.ceil((GC.GAME_COOLDOWN*1000-(Date.now()-GC._lastGameEnd))/1000);
  return Math.max(0,rem);
}
